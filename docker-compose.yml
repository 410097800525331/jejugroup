services:
  app:
    build:
      context: .
      dockerfile: jeju-spring/Dockerfile
    container_name: jejugroup-app
    restart: unless-stopped
    env_file:
      - /opt/jejugroup/.env
    environment:
      JEJU_SHARED_ENV_PATH: /opt/jejugroup/.env
      MYPAGE_AVATAR_UPLOAD_ROOT: /uploads
      SERVER_PORT: "8080"
    volumes:
      - /opt/jejugroup/.env:/opt/jejugroup/.env:ro
      - /uploads:/uploads
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: jejugroup-mysql
    restart: unless-stopped
    env_file:
      - /opt/jejugroup/.env
    environment:
      TZ: Asia/Seoul
    volumes:
      - jejugroup_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    container_name: jejugroup-nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /uploads:/uploads:ro

volumes:
  jejugroup_mysql_data:
    name: jejugroup_mysql_data
