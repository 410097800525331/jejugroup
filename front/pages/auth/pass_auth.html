<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASS ?몄쬆</title>
    <link rel="stylesheet" href="../../styles/globals.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff;
            font-family: 'FlightSans', sans-serif;
            overflow-x: hidden;
        }

        .pass-modal-content {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 0 20px;
        }

        .pass-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 30px 0 20px;
        }

        .pass-logo-red {
            background-color: #f7323f;
            color: #fff;
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 5px;
            padding: 4px 10px;
            line-height: 1;
            display: inline-block;
        }

        .pass-header-text {
            text-align: right;
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }

        .pass-screen {
            display: none;
            flex: 1;
            padding: 20px 0;
            animation: fade 0.3s ease;
        }

        .pass-screen.active {
            display: block;
        }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .pass-title {
            font-size: 26px;
            font-weight: 700;
            color: #111;
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .telecom-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .telecom-btn {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            height: 80px;
            font-size: 16px;
            font-weight: 700;
            color: #111;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.2s;
        }

        .telecom-btn.mvno {
            background: #f7f7f7;
            font-size: 14px;
            color: #666;
        }

        .telecom-btn:hover {
            border-color: #111;
            border-width: 2px;
        }

        .authmethod-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .authmethod-btn {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }

        .authmethod-btn:hover {
            border-color: #111;
        }

        .method-info strong {
            display: block;
            font-size: 18px;
            color: #111;
            margin-bottom: 5px;
        }

        .method-info span {
            font-size: 13px;
            color: #888;
        }

        .pass-input-group {
            margin-bottom: 15px;
        }

        .pass-input-group input {
            width: 100%;
            height: 54px;
            border: 1px solid #111;
            border-radius: 10px;
            padding: 0 16px;
            font-size: 16px;
            box-sizing: border-box;
        }

        .pass-input-group input.readonly {
            background: #fdfdfd;
            border-color: #ddd;
            color: #111;
            pointer-events: none;
        }

        .pass-reg-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            gap: 10px;
        }

        .pass-reg-group input {
            height: 54px;
            border: 1px solid #111;
            border-radius: 10px;
            padding: 0 16px;
            font-size: 16px;
            box-sizing: border-box;
            text-align: center;
        }

        .pass-reg-group input#passRegNum1 {
            width: 140px;
        }

        .pass-reg-group input#passRegNum2 {
            width: 54px;
        }

        .pass-reg-group .dash {
            font-size: 16px;
            color: #666;
        }

        .pass-reg-group .dots {
            color: #888;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .phone-input-group {
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pass-next-btn {
            width: 100%;
            height: 56px;
            background: #f7323f;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            margin-top: 20px;
            cursor: pointer;
        }

        .captcha-wrapper {
            animation: slideDown 0.3s ease;
        }

        .captcha-box-complex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 15px;
        }

        .captcha-img-complex {
            font-size: 34px;
            font-weight: 900;
            color: #000;
            letter-spacing: -1px;
            font-family: inherit;
            position: relative;
            transform: skewX(-10deg);
        }

        .captcha-img-complex::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -5%;
            width: 110%;
            height: 3px;
            background: #000;
            transform: translateY(-50%) rotate(-5deg);
        }

        .captcha-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-captcha-action {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            color: #555;
            gap: 5px;
        }

        .btn-captcha-action i {
            font-size: 16px;
        }

        .btn-captcha-action span {
            font-size: 12px;
        }

        .captcha-divider {
            width: 1px;
            height: 30px;
            background: #ddd;
        }

        .pass-confirm-ui {
            text-align: center;
            margin-top: 40px;
        }

        .pass-title-center {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 30px;
        }

        .red-text {
            color: #f7323f;
        }

        .phone-mockup {
            width: 220px;
            height: 120px;
            border: 4px solid #333;
            border-radius: 20px;
            margin: 0 auto;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.3);
            position: relative;
            background-color: #f8f9fa;
        }

        .phone-alert {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            width: 80%;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(0, 0, 0, 0.05);
            position: absolute;
            top: 10px;
            left: 10%;
            box-sizing: border-box;
            text-align: left;
        }

        .alert-logo {
            font-size: 11px;
            font-weight: 800;
            color: #f7323f;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .alert-text strong {
            display: block;
            font-size: 13px;
            color: #111;
            margin-bottom: 2px;
        }

        .alert-text span {
            font-size: 11px;
            color: #666;
        }

        .pass-loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #fff;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .pass-footer {
            margin-top: auto;
            padding-bottom: 30px;
            text-align: center;
            font-size: 12px;
            color: #888;
            line-height: 1.6;
        }

        .pass-footer strong {
            color: #444;
        }
    </style>
</head>

<body>
    <div class="pass-modal-content">
        <div class="pass-header">
            <div class="pass-logo-red">PASS</div>
            <div class="pass-header-text">?몄쬆???섏뼱<br>?쇱긽?쇰줈 PASS</div>
        </div>

        <!-- Screen 1: Telecom Selection -->
        <div class="pass-screen active" id="passScreen1">
            <h2 class="pass-title">?댁슜以묒씤 ?듭떊?щ?<br>?좏깮??二쇱꽭??/h2>
            <div class="telecom-grid">
                <button type="button" class="telecom-btn">SKT</button>
                <button type="button" class="telecom-btn">KT</button>
                <button type="button" class="telecom-btn">LG U+</button>
                <button type="button" class="telecom-btn mvno">SKT<br>?뚮쑑??/button>
                <button type="button" class="telecom-btn mvno">KT<br>?뚮쑑??/button>
                <button type="button" class="telecom-btn mvno">LG U+<br>?뚮쑑??/button>
            </div>
        </div>

        <!-- Screen 2: Auth Method -->
        <div class="pass-screen" id="passScreen2">
            <h2 class="pass-title">?몄쬆諛⑸쾿??br>?좏깮?댁＜?몄슂</h2>
            <div class="authmethod-list">
                <button type="button" class="authmethod-btn">
                    <div class="method-info">
                        <strong>PASS ?몄쬆</strong>
                        <span>?깆쑝濡?媛꾪렪?섍퀬 ?덉쟾?섍쾶!</span>
                    </div>
                </button>
                <button type="button" class="authmethod-btn sms-btn" id="btnSelectSms">
                    <div class="method-info">
                        <strong>臾몄옄(SMS) ?몄쬆</strong>
                        <span>SMS ?몄쬆踰덊샇濡?蹂몄씤?뺤씤</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Screen 3: Name Input -->
        <div class="pass-screen" id="passScreen3">
            <h2 class="pass-title">?대쫫??br>?낅젰??二쇱꽭??/h2>
            <div class="pass-input-group">
                <input type="text" id="passNameInput" placeholder="?대쫫" value="">
            </div>
            <button type="button" class="pass-next-btn" id="btnPassNextToPhone">?ㅼ쓬</button>
        </div>

        <!-- Screen 4: Phone & Captcha Flow -->
        <div class="pass-screen" id="passScreen4">
            <h2 class="pass-title" id="screen4Title">?앸뀈?붿씪/?깅퀎??br>?낅젰??二쇱꽭??/h2>
            <div class="pass-input-group">
                <input type="text" id="passNameDisplay" value="" readonly class="readonly">
            </div>

            <div class="pass-reg-group">
                <input type="text" id="passRegNum1" placeholder="?앸뀈?붿씪 6?먮━" maxlength="6">
                <span class="dash">-</span>
                <input type="text" id="passRegNum2" maxlength="1">
                <span class="dots">?뤴뿈?뤴뿈?뤴뿈</span>
            </div>

            <div class="pass-input-group phone-input-group" id="phoneInputGroup">
                <input type="text" id="passPhoneInput" placeholder="?대??곕쾲?? value="" maxlength="13">
            </div>

            <div class="captcha-wrapper" id="captchaWrapper"
                style="display: none; justify-content: center; margin-bottom: 15px;">
                <div id="recaptchaContainer"></div>
            </div>

            <button type="button" class="pass-next-btn" id="btnPassSubmitAuth" style="display: none;">?뺤씤</button>
        </div>

        <!-- Screen 5: Authenticating Wait -->
        <div class="pass-screen" id="passScreen5">
            <div class="pass-confirm-ui" style="margin-top: 100px;">
                <div class="pass-loader"
                    style="width: 50px; height: 50px; border-width: 4px; border-color: rgba(247, 50, 63, 0.2); border-top-color: #f7323f; margin-bottom: 30px;">
                </div>
                <div class="pass-title-center" style="margin-bottom: 10px;">
                    <strong>?몄쬆 以묒엯?덈떎</strong>
                </div>
                <div style="font-size: 14px; color: #888;">?좎떆留?湲곕떎??二쇱꽭??/div>
            </div>
        </div>

        <div class="pass-footer">
            ?댁슜?쎄? <strong>媛쒖씤?뺣낫泥섎━諛⑹묠</strong><br>
            VeriSign 256-bit SSL ?뷀샇???곸슜
        </div>
    </div>

    <script>
        const passScreens = [
            document.getElementById('passScreen1'),
            document.getElementById('passScreen2'),
            document.getElementById('passScreen3'),
            document.getElementById('passScreen4'),
            document.getElementById('passScreen5')
        ];

        const showPassScreen = (idx) => {
            passScreens.forEach((screen, i) => {
                if (screen) {
                    if (i === idx) screen.classList.add('active');
                    else screen.classList.remove('active');
                }
            });
        };

        // DOM Elements
        document.querySelectorAll('.telecom-btn').forEach(btn => btn.addEventListener('click', () => showPassScreen(1)));

        document.getElementById('btnSelectSms').addEventListener('click', () => showPassScreen(2));

        // Name -> Phone Transition
        document.getElementById('btnPassNextToPhone').addEventListener('click', () => {
            const passName = document.getElementById('passNameInput').value;
            if (!passName) return alert('?대쫫???낅젰?댁＜?몄슂.');
            document.getElementById('passNameDisplay').value = passName;
            showPassScreen(3);
        });

        // 4 screen logic (RegNum -> Phone -> Captcha -> Confirm)
        const passRegNum1 = document.getElementById('passRegNum1');
        const passRegNum2 = document.getElementById('passRegNum2');
        const passPhoneInput = document.getElementById('passPhoneInput');
        const phoneInputGroup = document.getElementById('phoneInputGroup');
        const captchaWrapper = document.getElementById('captchaWrapper');
        const btnPassSubmitAuth = document.getElementById('btnPassSubmitAuth');
        const screen4Title = document.getElementById('screen4Title');

        let isRecaptchaVerified = false;

        const TEST_RECAPTCHA_SITE_KEY = '6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI';

        window.onRecaptchaSuccess = function (token) {
            fetch('/api/auth/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: 'verifyRecaptcha',
                    token: token
                })
            })
                .then(async (res) => {
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok || !data.success) {
                        throw new Error(data.message || 'reCAPTCHA verification failed');
                    }
                    return data;
                })
                .then(() => {
                    isRecaptchaVerified = true;
                    checkFlow();
                })
                .catch((e) => {
                    console.error('reCAPTCHA verify request failed. fallback allow.', e);
                    isRecaptchaVerified = true;
                    checkFlow();
                });
        };

        document.addEventListener('DOMContentLoaded', () => {
            fetch('/api/auth/verify')
                .then(async (res) => {
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok || !data.siteKey) {
                        throw new Error(data.message || 'Site key missing');
                    }
                    return data;
                })
                .then((data) => {
                    tryRenderRecaptcha(data.siteKey);
                })
                .catch((e) => {
                    console.error('Site key fetch failed. fallback test key.', e);
                    tryRenderRecaptcha(TEST_RECAPTCHA_SITE_KEY);
                });
        });

        const tryRenderRecaptcha = (siteKey) => {
            const renderInterval = setInterval(() => {
                if (window.grecaptcha && window.grecaptcha.render) {
                    clearInterval(renderInterval);
                    grecaptcha.render('recaptchaContainer', {
                        sitekey: siteKey,
                        callback: onRecaptchaSuccess
                    });
                }
            }, 100);
        };

        const checkFlow = () => {
            const regFull = passRegNum1.value.length === 6 && passRegNum2.value.length === 1;
            const phoneFull = passPhoneInput.value.length === 13; // Formatted includes exactly 2 hyphens (e.g. 010-1234-5678 -> 13)

            if (regFull && !phoneFull) {
                phoneInputGroup.style.display = 'block';
                captchaWrapper.style.display = 'none';
                btnPassSubmitAuth.style.display = 'none';
                screen4Title.innerHTML = '?대??곕쾲?몃?<br>?낅젰??二쇱꽭??;
            } else if (regFull && phoneFull) {
                phoneInputGroup.style.display = 'block';
                captchaWrapper.style.display = 'flex';
                screen4Title.innerHTML = '蹂댁븞臾몄옄瑜?br>?낅젰??二쇱꽭??;

                if (isRecaptchaVerified) {
                    btnPassSubmitAuth.style.display = 'block';
                } else {
                    btnPassSubmitAuth.style.display = 'none';
                }
            } else {
                phoneInputGroup.style.display = 'none';
                captchaWrapper.style.display = 'none';
                btnPassSubmitAuth.style.display = 'none';
                screen4Title.innerHTML = '?앸뀈?붿씪/?깅퀎??br>?낅젰??二쇱꽭??;
            }
        };

        passRegNum1.addEventListener('input', () => {
            passRegNum1.value = passRegNum1.value.replace(/[^0-9]/g, '');
            if (passRegNum1.value.length === 6) {
                passRegNum2.focus();
            }
            checkFlow();
        });

        passRegNum2.addEventListener('input', () => {
            passRegNum2.value = passRegNum2.value.replace(/[^1-8]/g, '');
            checkFlow();
            if (passRegNum2.value.length === 1) {
                setTimeout(() => { passPhoneInput.focus(); }, 100);
            }
        });

        passPhoneInput.addEventListener('input', () => {
            // Remove all non-digits first
            let rawStr = passPhoneInput.value.replace(/[^0-9]/g, '');
            let formattedStr = '';

            // Format with hyphens automatically
            if (rawStr.length < 4) {
                formattedStr = rawStr;
            } else if (rawStr.length < 8) {
                formattedStr = rawStr.substring(0, 3) + '-' + rawStr.substring(3);
            } else if (rawStr.length === 10) {
                formattedStr = rawStr.substring(0, 3) + '-' + rawStr.substring(3, 6) + '-' + rawStr.substring(6);
            } else {
                formattedStr = rawStr.substring(0, 3) + '-' + rawStr.substring(3, 7) + '-' + rawStr.substring(7);
            }

            passPhoneInput.value = formattedStr;
            checkFlow();

            if (rawStr.length === 11) {
                // Remove the focus hijack to allow ReCAPTCHA checkbox to be clicked manually
            }
        });

        // Captcha Submit & Auto-Authenticate Wait
        btnPassSubmitAuth.addEventListener('click', () => {
            // ?붾㈃ ?꾪솚 -> ?몄쬆 以묒엯?덈떎...
            showPassScreen(4);

            // 3珥??湲????먮룞 ?몄쬆 ?깃났 泥섎━
            setTimeout(() => {
                const passName = document.getElementById('passNameInput').value || '홍길동';
                const passPhone = document.getElementById('passPhoneInput').value || '01012345678';
                const passRegNum1Val = document.getElementById('passRegNum1').value;
                const passRegNum2Val = document.getElementById('passRegNum2').value;
                const passGender = (passRegNum2Val === '1' || passRegNum2Val === '3' || passRegNum2Val === '5' || passRegNum2Val === '7') ? 'M' : 'F';
                const passBirthDate = passRegNum1Val.length === 6
                    ? `${passRegNum1Val.slice(0, 2)}-${passRegNum1Val.slice(2, 4)}-${passRegNum1Val.slice(4, 6)}`
                    : '';

                // Opener 콜백
                if (window.opener && !window.opener.closed) {
                    window.opener.handlePassSuccess(passName, passPhone, passGender, passBirthDate, passRegNum2Val);
                }

                window.close();
            }, 3000);
        });
    </script>
</body>

</html>
