<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>회원가입 | 제주그룹</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 통합 스타일 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../styles/globals.css">
    <link rel="stylesheet" href="../../components/layout/header/header.css">
    <link rel="stylesheet" href="../../components/layout/mega_menu/mega-menu.css">
    <link rel="stylesheet" href="../../components/layout/footer/footer.css">
    <link rel="stylesheet" href="./signup.css">

    <!-- Daum Postcode API -->
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js" defer></script>

    <!-- Social SDKs -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js"
        integrity="sha384-lXV7Adt7da177WMCp88p5uqcue1NOXSTjE2u5GZQJ7W75E61GAs75fT9u9DMTBv8"
        crossorigin="anonymous"></script>
    <script src="https://static.nid.naver.com/js/naveridlogin_js_sdk_2.0.2.js" charset="utf-8"></script>
</head>

<body class="signup-page">
    <div id="main-header-placeholder"></div>

    <main class="signup-wrapper">
        <section class="signup-container user_box inner2">
            <!-- Step Header -->
            <header class="step-header">
                <h1 class="step-title" id="stepTitle">회원가입</h1>
                <p class="step-desc" id="stepDesc">모든 여행을 제주그룹 하나로 누려보세요.</p>
            </header>

            <form id="signup_form" class="user_form step-form">
                <!-- 계정 정보 (Account Info) -->
                <div class="input_group">
                    <label for="userId">아이디</label>
                    <div class="input-with-button">
                        <input type="text" id="userId" name="userId" placeholder="영문, 숫자 4~20자" required>
                        <button type="button" class="btn-secondary btn-verify" id="btnCheckId">중복확인</button>
                    </div>
                    <span class="input-feedback" id="feedbackId"></span>
                </div>

                <div class="input_group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="영문, 숫자, 특수문자 조합 8자 이상" required>
                    <span class="input-feedback" id="feedbackPw"></span>
                </div>

                <div class="input_group">
                    <label for="passwordConfirm">비밀번호 확인</label>
                    <input type="password" id="passwordConfirm" name="passwordConfirm" placeholder="비밀번호 다시 입력"
                        required>
                    <span class="input-feedback" id="feedbackPwConfirm"></span>
                </div>

                <div class="input_group">
                    <label for="userName">이름</label>
                    <div class="input-with-button">
                        <input type="text" id="userName" name="userName" placeholder="이름 입력 (또는 휴대전화 인증)" required>
                        <button type="button" class="btn-secondary btn-verify pass" data-method="pass">본인인증</button>
                    </div>
                </div>

                <!-- Hidden inputs to store verified data securely -->
                <input type="hidden" name="verifiedName" id="verifiedName" value="">
                <input type="hidden" name="verifiedPhone" id="verifiedPhone" value="">
                <input type="hidden" name="verifiedGender" id="verifiedGender" value="">

                <div id="authNotice" class="auth-notice hidden" style="margin-bottom: 20px;">
                    <i class="fa-solid fa-circle-check"></i> <span id="authMessage">인증이 완료되었습니다.</span>
                </div>

                <div class="input_group">
                    <label for="userEmail">이메일</label>
                    <input type="email" id="userEmail" name="userEmail" placeholder="example@email.com" required>
                </div>

                <!-- 약관 동의 (Terms Agreement) -->
                <div class="agree_box">
                    <label class="check-all">
                        <input type="checkbox" id="termAll">
                        <span>모두 동의합니다.</span>
                    </label>
                    <hr class="terms-divider">
                    <label>
                        <input type="checkbox" class="term-item req" name="termService" required>
                        [필수] 이용약관 동의
                    </label>
                    <label>
                        <input type="checkbox" class="term-item req" name="termPrivacy" required>
                        [필수] 개인정보 수집 및 이용 동의
                    </label>
                    <label>
                        <input type="checkbox" class="term-item opt" name="termMarketing">
                        [선택] 마케팅 정보 수신 동의
                    </label>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="btnSignupSubmit">가입 완료</button>
                </div>
            </form>
        </section>
    </main>

    <div id="main-footer-placeholder"></div>

    <!-- Core Scripts (Zero Monolith Architecture) -->
    <script src="../../core/constants/lang_data.js"></script>
    <script src="../../jejustay/pages/hotel/main.js"></script>

    <!-- Component Scripts (Must load before component_loader.js) -->
    <script src="../../components/layout/header/header.js"></script>
    <script src="../../components/layout/mega_menu/mega-menu.js"></script>
    <script src="../../components/layout/footer/footer.js"></script>

    <script src="../../components/layout/component_loader.js"></script>

    <script type="module">
        import { initSignupLogic } from './js/signup_main.js';

        document.addEventListener('DOMContentLoaded', () => {
            initSignupLogic();
        });
    </script>
</body>

</html>
