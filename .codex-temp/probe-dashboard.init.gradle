gradle.projectsLoaded {
  rootProject.allprojects { p ->
    if (p.path == ':') {
      p.tasks.register('compileProbeDashboard', JavaCompile) {
        source = p.files('D:/git/jejugroup/.codex-temp/ProbeDashboard.java')
        destinationDirectory = p.file('D:/git/jejugroup/.codex-temp/probe-dashboard-classes')
        classpath = p.sourceSets.main.runtimeClasspath
        options.encoding = 'UTF-8'
      }
      p.tasks.register('runProbeDashboard', JavaExec) {
        dependsOn 'compileProbeDashboard'
        classpath = p.sourceSets.main.runtimeClasspath + p.files('D:/git/jejugroup/.codex-temp/probe-dashboard-classes')
        mainClass = 'ProbeDashboard'
      }
    }
  }
}
