<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 운영 관리 - 제주여행 관리자</title>

    <script th:src="@{/front-mirror/admin/js/auth_guard.js}" src="/front-mirror/admin/js/auth_guard.js"></script>

    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/theme.css}" href="/front-mirror/admin/css/theme.css">
    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/layout.css}" href="/front-mirror/admin/css/layout.css">
    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/components.css}" href="/front-mirror/admin/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="admin-mode">
    <button class="admin-sidebar-toggle" id="admin-sidebar-toggle" aria-label="메뉴 토글">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:24px; height:24px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <div class="admin-layout">
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <span>Jeju</span> Admin
            </div>
            <nav class="admin-menu" id="admin-sidebar-menu"></nav>
        </aside>

        <header class="admin-header">
            <div class="admin-header-right-group">
                <!-- Return to Portals (Micro-Navigation) -->
                <nav class="admin-portal-nav" aria-label="Portal Navigation">
                    <a href="#" class="portal-btn route-link" data-route="HOME" title="메인 랜딩으로">
                        <i data-lucide="home" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">메인</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                    <a href="#" class="portal-btn route-link" data-route="SERVICES.AIR.MAIN" title="제주에어로">
                        <i data-lucide="plane" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">에어</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                    <a href="#" class="portal-btn route-link" data-route="SERVICES.STAY.MAIN" title="제주스테이로">
                        <i data-lucide="building" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">스테이</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                </nav>
                <div class="admin-profile-container" id="admin-profile-container">
                    <div class="admin-user-profile" id="admin-profile-trigger">
                        <div class="admin-user-info">
                            <span class="admin-user-name" id="admin-user-name">Loading...</span>
                            <span class="admin-user-role" id="admin-user-role">-</span>
                        </div>
                        <div class="admin-avatar">AD</div>
                        <i data-lucide="chevron-down" class="admin-dropdown-icon"
                            style="width:16px; margin-left:8px; color:var(--admin-text-secondary);"></i>
                    </div>

                    <div class="admin-dropdown-menu" id="admin-dropdown-menu">
                        <div class="dropdown-header">
                            <strong data-lang="adminSettings">환경 설정</strong>
                        </div>

                        <div class="dropdown-section">
                            <span class="dropdown-section-title">테마 모드</span>
                            <div class="admin-theme-toggle" id="admin-theme-toggle">
                                <button class="theme-btn active" data-theme="system" title="시스템 테마">💻</button>
                                <button class="theme-btn" data-theme="dark" title="다크 모드">🌙</button>
                                <button class="theme-btn" data-theme="light" title="라이트 모드">☀️</button>
                            </div>
                        </div>

                        <div class="dropdown-section">
                            <span class="dropdown-section-title">언어 설정</span>
                            <div class="admin-lang-toggle">
                                <button class="lang-btn active" data-lang-val="ko">KOR</button>
                                <button class="lang-btn" data-lang-val="en">ENG</button>
                            </div>
                        </div>

                        <div class="dropdown-divider"></div>

                        <ul class="dropdown-menu-list">
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">👥</span>
                                    <span>관리자 명단 보기</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">⚙️</span>
                                    <span>내 프로필 설정</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">🔒</span>
                                    <span>보안 로그 (Audit)</span>
                                </a>
                            </li>
                        </ul>

                        <div class="dropdown-divider"></div>

                        <button class="dropdown-item danger-item" id="admin-logout-btn">
                            <span
                                style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">🚪</span>
                            <span>로그아웃</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="admin-main">
            <div class="admin-page-header">
                <h1 class="admin-page-title">콘텐츠 운영 관리</h1>
                <div style="display: flex; gap: var(--admin-space-md); align-items: center;">
                    <div class="admin-segment-control" id="admin-domain-filters">
                        <button class="segment-btn active" data-domain="notices">공지사항</button>
                        <button class="segment-btn" data-domain="faqs">FAQ</button>
                        <button class="segment-btn" data-domain="banner">배너</button>
                    </div>
                </div>
            </div>

            <div class="admin-table-actions"
                style="margin-bottom: var(--admin-space-lg); display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; gap:8px;">
                    <input type="text" placeholder="콘텐츠 제목 또는 태그 검색..."
                        style="padding: 8px 12px; border-radius:6px; border:1px solid var(--admin-border); background:var(--admin-surface); color:var(--admin-text-primary); outline:none;">
                    <select
                        id="cms-status-filter"
                        style="padding: 8px 12px; border-radius:6px; border:1px solid var(--admin-border); background:var(--admin-surface); color:var(--admin-text-primary); outline:none;">
                        <option value="all">상태: 전체</option>
                        <option value="active">노출 중</option>
                        <option value="draft">예약 / 임시저장</option>
                        <option value="inactive">비노출</option>
                    </select>
                    <select
                        id="cms-notice-type-filter"
                        hidden
                        style="padding: 8px 12px; border-radius:6px; border:1px solid var(--admin-border); background:var(--admin-surface); color:var(--admin-text-primary); outline:none;">
                        <option value="all">유형: 전체</option>
                        <option value="notice">공지사항</option>
                        <option value="event">이벤트</option>
                    </select>
                    <button class="admin-btn admin-btn-outline" id="cms-search-btn">검색</button>
                </div>
                <div style="display:flex; gap:8px;">
                    <button class="admin-btn admin-btn-outline" id="cms-secondary-action-btn">배포 정리</button>
                    <button class="admin-btn admin-btn-primary" id="cms-primary-action-btn">신규 항목 생성</button>
                </div>
            </div>

            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>콘텐츠 ID</th>
                            <th>분류</th>
                            <th>유형</th>
                            <th>제목</th>
                            <th>작성 / 예약일</th>
                            <th>노출 상태</th>
                            <th>액션</th>
                        </tr>
                    </thead>
                    <tbody id="cms-table-body">
                    </tbody>
                </table>
            </div>

            <div style="display:flex; justify-content:center; margin-top:20px; gap:8px;">
                <button class="admin-btn admin-btn-outline" disabled>&lt;</button>
                <button class="admin-btn admin-btn-primary">1</button>
                <button class="admin-btn admin-btn-outline">&gt;</button>
            </div>
        </main>
    </div>

    <div class="admin-modal-backdrop" id="cms-notice-modal" hidden>
        <div class="admin-modal" role="dialog" aria-modal="true" tabindex="-1" aria-labelledby="cms-notice-modal-title"
            aria-describedby="cms-notice-modal-desc">
            <div class="admin-modal-header">
                <div>
                    <p class="admin-modal-eyebrow">공지사항 등록</p>
                    <h2 class="admin-modal-title" id="cms-notice-modal-title">새 공지 작성</h2>
                </div>
                <button class="admin-modal-close" type="button" id="cms-notice-modal-close" aria-label="닫기">
                    <i data-lucide="x" style="width:18px; height:18px;"></i>
                </button>
            </div>
            <p class="admin-modal-description" id="cms-notice-modal-desc">
                서비스 분류와 공지 유형을 포함해 새 공지를 바로 저장합니다.
            </p>

            <form class="admin-modal-body" id="cms-notice-form">
                <div class="admin-modal-grid">
                    <label class="admin-form-field" for="cms-notice-service-category">
                        <span class="admin-form-label">서비스 분류</span>
                        <select class="admin-form-control" id="cms-notice-service-category" name="serviceCategory">
                            <option value="integrated">통합</option>
                            <option value="air">에어</option>
                            <option value="stay">스테이</option>
                            <option value="rentcar">렌터카</option>
                        </select>
                    </label>
                    <label class="admin-form-field" for="cms-notice-type">
                        <span class="admin-form-label">공지 유형</span>
                        <select class="admin-form-control" id="cms-notice-type" name="noticeType">
                            <option value="notice">공지사항</option>
                            <option value="event">이벤트</option>
                        </select>
                    </label>
                </div>
                <label class="admin-form-field" for="cms-notice-title">
                    <span class="admin-form-label">제목</span>
                    <input class="admin-form-control" id="cms-notice-title" name="title" type="text"
                        placeholder="공지 제목을 입력하세요" autocomplete="off">
                </label>
                <label class="admin-form-field" for="cms-notice-content">
                    <span class="admin-form-label">공지 내용</span>
                    <textarea class="admin-form-control" id="cms-notice-content" name="content" rows="8"
                        placeholder="공지 내용을 입력하세요"></textarea>
                </label>
            </form>

            <div class="admin-modal-footer">
                <button class="admin-btn admin-btn-outline" type="button" id="cms-notice-modal-cancel">취소</button>
                <button class="admin-btn admin-btn-primary" type="button" id="cms-notice-modal-submit">등록</button>
            </div>
        </div>
    </div>

    <script th:src="@{/front-mirror/admin/js/rbac_config.js}" src="/front-mirror/admin/js/rbac_config.js"></script>
    <script th:src="@{/front-mirror/admin/js/sidebar_ui.js}" src="/front-mirror/admin/js/sidebar_ui.js"></script>
    <script th:src="@{/front-mirror/admin/js/store.js}" src="/front-mirror/admin/js/store.js"></script>
    <script th:src="@{/front-mirror/admin/js/portal_nav.js}" src="/front-mirror/admin/js/portal_nav.js"></script>
    <script th:src="@{/front-mirror/admin/js/cms.js}" src="/front-mirror/admin/js/cms.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
