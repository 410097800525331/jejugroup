<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: pageHead('JEJU STAY | 호텔 검색 결과')}"></th:block>
    <link rel="stylesheet" th:href="@{/jejustay/pages/hotel/hotel.css}" href="/jejustay/pages/hotel/hotel.css">
    <link rel="stylesheet" th:href="@{/components/react/layout/header.css}" href="/components/react/layout/header.css">
    <link rel="stylesheet" th:href="@{/components/react/layout/footer.css}" href="/components/react/layout/footer.css">
    <link rel="stylesheet" th:href="@{/assets/css/stay/hotel-list.css}" href="/assets/css/stay/hotel-list.css">
</head>
<body class="stay-hotel-list-page" th:attr="data-shell=${page.shell}">
<div id="hotel-header-placeholder"></div>
<main class="hotel-list-shell">
    <div class="sticky-search-wrapper">
        <div class="container-wide">
            <div id="hotel-list-search-widget-root">
                <div class="hotel-runtime-fallback hotel-runtime-fallback--search">
                    <strong>검색 UI 로딩 중</strong>
                    <span th:text="${page.searchSummary.destinationLabel}">히로시마, 일본</span>
                </div>
            </div>
        </div>
    </div>

    <div class="container-wide">
        <div class="hotel-feed-container" id="hotel-list-page-root">
            <div class="hotel-runtime-fallback hotel-runtime-fallback--sidebar">
                <strong th:text="${page.regionLabel} + ' 필터 로딩 중'">히로시마 필터 로딩 중</strong>
                <span th:text="${page.mapButtonLabel}">지도에서 호텔 보기</span>
            </div>

            <div class="hotel-runtime-fallback hotel-runtime-fallback--list">
                <strong>호텔 결과 로딩 중</strong>
                <span th:text="${page.hotels[0].title}">히로시마 프리미엄 호텔</span>
            </div>
        </div>
    </div>
</main>
<noscript>
    <div class="container-wide hotel-runtime-noscript">
        <p>이 페이지는 JavaScript 기반 호텔 리스트 UI를 사용한다. 브라우저에서 JavaScript를 켜야 한다.</p>
        <a th:href="${page.migrationPath}" href="/migration">migration hub</a>
    </div>
</noscript>
<div id="hotel-footer-placeholder"></div>
<script id="hotel-list-page-data" th:utext="${pageJson}" type="application/json"></script>
<script type="module" th:src="@{/components/runtime/bootstrap.js}" src="/components/runtime/bootstrap.js"></script>
</body>
</html>
