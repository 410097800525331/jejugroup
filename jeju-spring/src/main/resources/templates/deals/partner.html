<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: pageHead('제휴 카드 할인 | JEJU STAY')}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/css/deals/deals.css}" href="/assets/css/deals/deals.css">
</head>
<body class="deals-partner-page" th:attr="data-shell=${page.shell}">
<main class="deals-shell partner-shell">
    <section class="partner-hero">
        <div class="container">
            <h1>Partnership Benefits</h1>
            <p th:text="${page.description}">desc</p>
        </div>
    </section>

    <section class="section container">
        <div class="deal-grid">
            <article class="deal-card partner-card" th:each="card : ${page.cards}">
                <img alt="partner benefit" th:src="${card.imageUrl}" src="">
                <div class="deal-body">
                    <span class="deal-badge" th:text="${card.badge}">badge</span>
                    <h3 th:text="${card.title}">title</h3>
                    <p th:text="${card.subtitle}">subtitle</p>
                    <strong class="current-price" th:text="${card.currentPrice}">value</strong>
                </div>
            </article>
        </div>
        <div class="cta-row">
            <a class="ghost-link" th:href="${page.migrationPath}" href="/migration">migration hub</a>
        </div>
    </section>
</main>
</body>
</html>
