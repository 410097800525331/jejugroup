spring:
  application:
    name: jeju-spring
  config:
    import: "optional:file:${JEJU_SHARED_ENV_PATH:./.env}[.properties]"
  datasource:
    url: ${DB_URL:${ALWAYSDATA_DB_URL:jdbc:mysql://localhost:3306/jejugroup_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DB_USER:${jejugroup}}
    password: ${DB_PASSWORD:${ALWAYSDATA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  thymeleaf:
    cache: false

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: false

info:
  app:
    name: ${spring.application.name}
    shared-env-path: ${JEJU_SHARED_ENV_PATH:./.env}

app:
  migration:
    shared-env-path: ${JEJU_SHARED_ENV_PATH:./.env}
    notes:
      - front stays as the editable source until each page is migrated to Thymeleaf
      - jeju-web deploy credentials remain the shared source for alwaysdata and ssh
      - auth APIs now run on Spring MVC, but DB access still follows the legacy users table contract
  alwaysdata:
    db-url: ${DB_URL:${ALWAYSDATA_DB_URL:jdbc:mysql://localhost:3306/jejugroup_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}}
    db-user: ${DB_USER:${ALWAYSDATA_DB_USER:jejugroup}}
    db-password: ${DB_PASSWORD:${ALWAYSDATA_DB_PASSWORD:}}
    ssh-host: ${ALWAYSDATA_SSH_HOST:${SSH_HOST:}}
    ssh-user: ${ALWAYSDATA_SSH_USER:${SSH_USER:}}
    ssh-password: ${ALWAYSDATA_SSH_PASSWORD:${SSH_PASSWORD:}}
    admin-email: ${ALWAYSDATA_ADMIN_EMAIL:${ADMIN_EMAIL:}}
    admin-password: ${ALWAYSDATA_ADMIN_PASSWORD:${ADMIN_PASSWORD:}}
    remote-deploy-path: ${REMOTE_DEPLOY_PATH:/home/jejugroup/ROOT.war}
  external:
    openweather-api-key: ${OPENWEATHER_API_KEY:}
    openai-api-key: ${OPENAI_API_KEY:}
  social:
    naver-client-id: ${NAVER_CLIENT_ID:}
    naver-client-secret: ${NAVER_CLIENT_SECRET:}
    kakao-js-key: ${KAKAO_JS_KEY:}
