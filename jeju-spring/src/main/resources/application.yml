spring:
  application:
    name: jeju-spring
  config:
    import:
      - "optional:file:${JEJU_SHARED_ENV_PATH:./.env}[.properties]"
      - "optional:file:${JEJU_SHARED_ENV_PATH:./jeju-spring/.env}[.properties]"
  datasource:
    url: ${DB_URL:${ALWAYSDATA_DB_URL:jdbc:mysql://localhost:3306/jejugroup_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}}
    username: ${DB_USER:${ALWAYSDATA_DB_USER:jejugroup}}
    password: ${DB_PASSWORD:${ALWAYSDATA_DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  thymeleaf:
    cache: false

server:
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: ${spring.application.name}
    shared-env-path: ${JEJU_SHARED_ENV_PATH:./.env}

app:
  migration:
    shared-env-path: ${JEJU_SHARED_ENV_PATH:./.env}
    notes:
      - front remains the editable source for browser content in the current final-runtime baseline
      - Spring host-only routes already count as completed runtime coverage in this baseline
      - jeju-spring/.env is the default shared env source for Spring runtime and deploy helpers
      - set JEJU_SHARED_ENV_PATH when a different shared env file is needed
      - auth APIs now run on Spring MVC, but DB access still follows the legacy users table contract
  database:
    db-url: ${DB_URL:${ALWAYSDATA_DB_URL:jdbc:mysql://localhost:3306/jejugroup_db?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true}}
    db-user: ${DB_USER:${ALWAYSDATA_DB_USER:jejugroup}}
    db-password: ${DB_PASSWORD:${ALWAYSDATA_DB_PASSWORD:}}
  alwaysdata:
    ssh-host: ${ALWAYSDATA_SSH_HOST:${SSH_HOST:}}
    ssh-user: ${ALWAYSDATA_SSH_USER:${SSH_USER:}}
    ssh-password: ${ALWAYSDATA_SSH_PASSWORD:${SSH_PASSWORD:}}
    admin-email: ${ALWAYSDATA_ADMIN_EMAIL:${ADMIN_EMAIL:}}
    admin-password: ${ALWAYSDATA_ADMIN_PASSWORD:${ADMIN_PASSWORD:}}
    remote-deploy-path: ${REMOTE_DEPLOY_PATH:/home/jejugroup/ROOT.war}
  external:
    openweather-api-key: ${OPENWEATHER_API_KEY:}
    gemini-api-key: ${GEMINI_API_KEY:}
    gemini-chat-base-url: ${GEMINI_CHAT_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
    gemini-chat-models:
      - gemini-3-flash-preview
      - gemini-2.5-flash-lite
      - gemini-2.5-flash
  social:
    naver-client-id: ${NAVER_CLIENT_ID:}
    naver-client-secret: ${NAVER_CLIENT_SECRET:}
    kakao-js-key: ${KAKAO_JS_KEY:}
  mypage:
    avatar-upload-root: ${MYPAGE_AVATAR_UPLOAD_ROOT:./.tmp/mypage-avatars}
  banner:
    upload-root: ${BANNER_UPLOAD_ROOT:./.tmp/banner-assets}
