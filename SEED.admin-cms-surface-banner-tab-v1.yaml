goal: >
  Continue the admin.table-surface rewrite by keeping `/api/admin/tables/cms`
  externally stable while aligning its tab contract with the front cms view
  and exposing banner data from the banner tables.
constraints:
  - Preserve the existing `/api/admin/tables/{surface}` path and the current top-level JSON response shape with `defaultTab` and `tabs`.
  - Limit this slice to the `cms` surface inside the existing Spring admin read source file.
  - Replace the mismatched `categories` tab in the backend cms surface payload with a `banner` tab that matches the front cms tab structure.
  - Back the new banner tab with `banners`, `banner_slots`, and exposure-rule data when those tables exist.
  - Keep the existing `notices` and `faqs` tabs compatible.
  - Do not revisit dashboard work, members surface work, other surfaces, front files, mirror outputs, or routing in this pass.
acceptance_criteria:
  - `/api/admin/tables/cms` still returns a successful payload with the same top-level structure expected by the current admin surface contract.
  - The `tabs` payload for the cms surface now includes `banner` instead of the mismatched `categories` key.
  - The banner tab rows are sourced from banner-related tables when those tables exist.
  - The cms surface default tab remains valid and existing notice/faq tabs continue to work.
verification:
  - `D:\\git\\jejugroup\\.codex-temp\\gradle-8.14.4\\bin\\gradle.bat compileJava`
out_of_scope:
  - Refactoring other `/api/admin/tables/{surface}` responses.
  - Moving support category data to another surface.
  - Front admin UI changes.
  - Spring mirror regeneration, deployment, or `jeju-web` edits.
