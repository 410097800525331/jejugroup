goal: Repair the remaining admin dashboard icon regression along with the earlier admin menu/tab repairs, then restore spring mirror parity from front.
constraints:
  - front is the only human-edited source of truth.
  - Do not edit jeju-web.
  - Keep auth/session/RBAC behavior unchanged.
  - Touch only the admin runtime files needed for sidebar/dashboard icon readability and section boot/tab interaction recovery.
  - Spring changes must stay derived from front.
acceptance_criteria:
  - Admin sidebar icons render as readable, intentional icons again.
  - Dashboard KPI icons render as readable, intentional icons again instead of odd placeholder glyphs.
  - Reservations, lodging, members, and cms sections successfully boot/register under AdminShell so their tab controls can bind and respond again.
  - The fix does not broaden into auth/session/RBAC behavior changes.
  - The repaired behavior can be mirrored into jeju-spring admin front-mirror assets without touching forbidden legacy paths.
verification:
  - Inspect repaired front admin files for icon definitions and working boot/register flow.
  - Run targeted syntax checks on repaired admin scripts including dashboard.js.
  - Run the existing front-to-spring sync for affected admin assets and inspect changed mirror paths.
  - Reviewer pass for sidebar/dashboard icon readability, tab interaction path, and mirror boundary compliance.
out_of_scope:
  - Redesigning the admin UI beyond the regression repair.
  - Changing admin auth/session policy.
  - Touching jeju-web/src/main/webapp.
