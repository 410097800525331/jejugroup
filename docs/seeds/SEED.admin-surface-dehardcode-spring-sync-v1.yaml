goal: >
  Reflect the admin dehardcode already completed in front into jeju-spring's existing
  pipeline-owned derived outputs only, so the admin front-mirror/static/templates/build
  artifacts stay aligned with current front behavior.
constraints:
  - Keep front as the source of truth; do not re-edit front admin source.
  - Treat jeju-spring as pipeline-generated output only; no manual spring source edits.
  - Limit changes to the admin front-mirror/static/templates/build outputs that the
    existing sync/build flow regenerates.
  - Allowed paths include `jeju-spring/src/main/resources/static/front-mirror/admin/**`,
    `jeju-spring/src/main/resources/templates/front-mirror/admin/pages/**`,
    `jeju-spring/build/resources/main/static/front-mirror/admin/**`, and
    `jeju-spring/build/resources/main/templates/front-mirror/admin/pages/**`.
  - Do not edit outside the mirror boundary.
  - Out of scope: jeju-web changes, deployment, WAR upload, and production rollouts.
acceptance_criteria:
  - After running `node scripts/spring/sync-front-assets-to-spring.cjs`, the admin-related
    jeju-spring derived outputs match the current front admin dehardcode.
  - If needed, `jeju-spring/gradlew.bat clean processResources` regenerates the same
    spring derived outputs.
  - Targeted diff/review shows only admin-related spring derived outputs changed, with
    no front source edits and no changes outside the mirror boundary.
  - The admin dehardcode behavior and text remain preserved in the spring mirror/runtime
    output.
verification:
  - `node scripts/spring/sync-front-assets-to-spring.cjs`
  - `jeju-spring/gradlew.bat clean processResources`
  - targeted diff/review of only the admin derived spring outputs regenerated by the pipeline
out_of_scope:
  - front admin source re-edit
  - deployment
  - WAR upload
  - jeju-web modifications
  - manual edits outside the existing sync/build-owned admin front-mirror/static/templates/build outputs
