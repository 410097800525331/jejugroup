<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JEJU STAY | 전 세계 호텔 예약</title>
    <meta name="description" content="제주그룹의 글로벌 호텔 예약 플랫폼. 전 세계 호텔, 리조트, 펜션을 최저가로 예약하세요.">

    <!-- Fonts: FlightSans is loaded via CSS @font-face, Noto Sans KR as fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/front-mirror/jejustay/pages/hotel/hotel.css}" href="/front-mirror/jejustay/pages/hotel/hotel.css">
    <link rel="stylesheet" th:href="@{/front-mirror/components/react/layout/header.css}" href="/front-mirror/components/react/layout/header.css">
    <link rel="stylesheet" th:href="@{/front-mirror/components/react/layout/footer.css}" href="/front-mirror/components/react/layout/footer.css">
    <link rel="stylesheet" th:href="@{/front-mirror/components/react/ui/FAB/fab.css}" href="/front-mirror/components/react/ui/FAB/fab.css">
    <link rel="stylesheet" th:href="@{/front-mirror/components/react/widget/chatbot-style.css}" href="/front-mirror/components/react/widget/chatbot-style.css">
    <!-- Tailwind CSS CDN (Optional Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <!-- ========== 섹션 1: 글로벌 헤더 (GNB) ========== -->
    <!-- 헤더 플레이스홀더 -->
    <div id="hotel-header-placeholder"></div>

    <main>
        <!-- ========== 섹션 2: 히어로 & 검색 위젯 ========== -->
        <section class="hero">
            <div class="hero-background">
                <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?q=100&w=3840&auto=format&fit=crop"
                    alt="Luxury Global Hotel 4K View" class="hero-image">
                <div class="hero-overlay"></div>
            </div>

            <div class="hero-content">
                <p class="hero-subtitle-top" data-lang="heroSubtitleTop">전 세계 200만 개 이상의 호텔, 리조트, 펜션을 최저가로 예약</p>

                <div id="hotel-search-widget-root"></div>
            </div>
        </section>

        <!-- ========== 섹션 3: 프로모션 배너 ========== -->
        <section class="promo-section" data-banner-family="promo_card_family">
            <div class="container">
                <div class="promo-grid">
                    <div class="promo-card promo-main" data-banner-slot="stay_hotel_promo_main">
                        <div class="promo-icon" data-banner-field="icon">
                            <i data-lucide="plane"></i>
                        </div>
                        <div class="promo-content">
                            <span class="promo-badge" data-banner-field="eyebrow"></span>
                            <h3 class="promo-title" data-banner-field="title" data-lang="promoTitle1"><br><strong></strong></h3>

                            <p class="promo-desc" data-banner-field="body" data-lang="promoDesc1"></p>
                            <a href="#" class="promo-link cta-link cta-bounce-target" aria-label="호텔 메인 프로모션 링크" data-banner-field="cta"><span data-banner-field="cta_label" data-lang="promoLink1"></span> <i
                                    data-lucide="arrow-right"></i></a>
                        </div>
                    </div>
                    <div class="promo-card promo-sub" data-banner-slot="stay_hotel_promo_sub_1">
                        <div class="promo-icon" data-banner-field="icon">
                            <i data-lucide="coins"></i>
                        </div>
                        <div class="promo-content">
                            <span class="promo-badge" data-banner-field="eyebrow"></span>
                            <h3 class="promo-title" data-banner-field="title" data-lang="promoTitle2"><br></h3>
                            <a href="#" class="promo-link cta-link cta-bounce-target" aria-label="호텔 서브 프로모션 링크" data-banner-field="cta"><span data-banner-field="cta_label" data-lang="promoLink2"></span> <i
                                    data-lucide="arrow-right"></i></a>
                        </div>
                    </div>
                    <div class="promo-card promo-sub" data-banner-slot="stay_hotel_promo_sub_2">
                        <div class="promo-icon" data-banner-field="icon">
                            <i data-lucide="car"></i>
                        </div>
                        <div class="promo-content">
                            <span class="promo-badge" data-banner-field="eyebrow"></span>
                            <h3 class="promo-title" data-banner-field="title" data-lang="promoTitle3"><br></h3>
                            <a href="#" class="promo-link cta-link cta-bounce-target" aria-label="호텔 패키지 프로모션 링크" data-banner-field="cta"><span data-banner-field="cta_label" data-lang="promoLink3"></span> <i
                                    data-lucide="arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== 섹션 4: 추천 여행지 ========== -->
        <section class="destinations-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title" data-lang="destTitle">한국인이 사랑하는 인기 여행지</h2>
                    <p class="section-subtitle" data-lang="destSubtitle">지금 가장 핫한 여행지에서 특별한 숙소를 만나보세요</p>
                </div>

                <div class="destinations-grid">
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "제주도"}'
                        class="destination-card large">
                        <img src="https://images.unsplash.com/photo-1570077188670-e3a8d69ac5ff?w=800&q=80" alt="제주도"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <span class="destination-badge" data-lang="badgeSpecial">특가</span>
                            <h3 class="destination-name" data-lang="destNameJeju">제주도</h3>
                            <p class="destination-hotels" data-lang="destCountJeju">숙소 3,240개</p>
                        </div>
                    </a>
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "오사카"}'
                        class="destination-card">
                        <img src="https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?w=600&q=80" alt="오사카"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <span class="destination-badge" data-lang="badgeSpecial">특가</span>
                            <h3 class="destination-name" data-lang="destNameOsaka">오사카</h3>
                            <p class="destination-hotels" data-lang="destCountOsaka">숙소 5,120개</p>
                        </div>
                    </a>
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "다낭"}'
                        class="destination-card">
                        <img src="https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?w=600&q=80" alt="다낭"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <span class="destination-badge" data-lang="badgeSpecial">특가</span>
                            <h3 class="destination-name" data-lang="destNameDanang">다낭</h3>
                            <p class="destination-hotels" data-lang="destCountDanang">숙소 2,890개</p>
                        </div>
                    </a>
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "방콕"}'
                        class="destination-card">
                        <img src="https://images.unsplash.com/photo-1508009603885-50cf7c579365?w=600&q=80" alt="방콕"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <span class="destination-badge" data-lang="badgeSpecial">특가</span>
                            <h3 class="destination-name" data-lang="destNameBangkok">방콕</h3>
                            <p class="destination-hotels" data-lang="destCountBangkok">숙소 8,450개</p>
                        </div>
                    </a>
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "도쿄"}'
                        class="destination-card">
                        <img src="https://images.unsplash.com/photo-1513407030348-c983a97b98d8?w=600&q=80" alt="도쿄"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <span class="destination-badge" data-lang="badgeSpecial">특가</span>
                            <h3 class="destination-name" data-lang="destNameTokyo">도쿄</h3>
                            <p class="destination-hotels" data-lang="destCountTokyo">숙소 7,320개</p>
                        </div>
                    </a>
                    <a href="#" data-route="SERVICES.STAY.HOTEL_LIST" data-route-params='{"keyword": "싱가포르"}'
                        class="destination-card">
                        <img src="https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?w=600&q=80" alt="싱가포르"
                            class="destination-image">
                        <div class="destination-overlay"></div>
                        <div class="destination-content">
                            <h3 class="destination-name" data-lang="destNameSingapore">싱가포르</h3>
                            <p class="destination-hotels" data-lang="destCountSingapore">숙소 1,890개</p>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <!-- ========== 섹션 5: 이달의 특가 호텔 ========== -->
        <section class="deals-section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title" data-lang="dealsTitle">이달의 특가 호텔</h2>
                    <p class="section-subtitle" data-lang="dealsSubtitle">JJ 멤버 전용 특별 할인가로 만나보세요</p>
                </div>

                <div class="hotel-list" id="hotel-monthly-deals-root" data-hotel-monthly-deals-root aria-busy="true"
                    aria-live="polite"></div>

                <div class="section-more">
                    <a href="#" class="more-btn cta-pill cta-bounce-target">
                        <span data-lang="moreHotels">더 많은 특가 호텔 보기</span>
                        <i data-lucide="chevron-right"></i>
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- ========== 섹션 6: 푸터 ========== -->
    <!-- 푸터 플레이스홀더 -->
    <div id="hotel-footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script th:src="@{/front-mirror/core/constants/lang_data.js}" src="/front-mirror/core/constants/lang_data.js"></script>
    <script th:src="@{/front-mirror/jejustay/shared/wishlist-button.js}" src="/front-mirror/jejustay/shared/wishlist-button.js"></script>
    <script th:src="@{/front-mirror/jejustay/pages/hotel/hotel.js}" src="/front-mirror/jejustay/pages/hotel/hotel.js"></script>
    <script type="module" th:src="@{/front-mirror/components/runtime/bootstrap.js}" src="/front-mirror/components/runtime/bootstrap.js"></script>
</body>

</html>
