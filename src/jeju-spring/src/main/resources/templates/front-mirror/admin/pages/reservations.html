<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약/결제/환불 관리 - 제주여행 관리자</title>

    <!-- Security Protocol: Immediate route guard first -->
    <script th:src="@{/front-mirror/admin/js/auth_guard.js}" src="/front-mirror/admin/js/auth_guard.js"></script>

    <!-- Theme & Layout (Zero Monolith) -->
    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/theme.css}" href="/front-mirror/admin/css/theme.css">
    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/layout.css}" href="/front-mirror/admin/css/layout.css">
    <link rel="stylesheet" th:href="@{/front-mirror/admin/css/components.css}" href="/front-mirror/admin/css/components.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="admin-mode">
    <!-- Floating Sidebar Toggle (Fixed coordinate) -->
    <button class="admin-sidebar-toggle" id="admin-sidebar-toggle" aria-label="메뉴 토글">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:24px; height:24px;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
    </button>

    <div class="admin-layout">

        <!-- Sidebar Navigation -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="admin-sidebar-logo">
                <span>Jeju</span> Admin
            </div>
            <nav class="admin-menu" id="admin-sidebar-menu">
                <!-- Dynamically populated by JS based on RBAC -->
            </nav>
        </aside>

        <!-- Top Header Navigation -->
        <header class="admin-header">
            <!-- Right Side Controls -->
            <div class="admin-header-right-group">
                <!-- Return to Portals (Micro-Navigation) -->
                <nav class="admin-portal-nav" aria-label="Portal Navigation">
                    <a href="#" class="portal-btn route-link" data-route="HOME" title="메인 랜딩으로">
                        <i data-lucide="home" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">메인</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                    <a href="#" class="portal-btn route-link" data-route="SERVICES.AIR.MAIN" title="제주에어로">
                        <i data-lucide="plane" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">에어</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                    <a href="#" class="portal-btn route-link" data-route="SERVICES.STAY.MAIN" title="제주스테이로">
                        <i data-lucide="building" style="width:16px; height:16px;"></i>
                        <span class="portal-btn-copy">
                            <span class="portal-btn-label">스테이</span>
                            <span class="portal-btn-hint">사이트 이동</span>
                        </span>
                    </a>
                </nav>
                <!-- User Profile & Dropdown Container -->
                <div class="admin-profile-container" id="admin-profile-container">
                    <!-- Profile Trigger -->
                    <div class="admin-user-profile" id="admin-profile-trigger">
                        <div class="admin-user-info">
                            <span class="admin-user-name" id="admin-user-name">Loading...</span>
                            <span class="admin-user-role" id="admin-user-role">-</span>
                        </div>
                        <div class="admin-avatar">AD</div>
                        <i data-lucide="chevron-down" class="admin-dropdown-icon"
                            style="width:16px; margin-left:8px; color:var(--admin-text-secondary);"></i>
                    </div>

                    <!-- Premium Dropdown Menu -->
                    <div class="admin-dropdown-menu" id="admin-dropdown-menu">
                        <div class="dropdown-header">
                            <strong data-lang="adminSettings">환경 설정</strong>
                        </div>

                        <div class="dropdown-section">
                            <span class="dropdown-section-title">테마 모드</span>
                            <div class="admin-theme-toggle" id="admin-theme-toggle">
                                <button class="theme-btn active" data-theme="system" title="시스템 테마">💻</button>
                                <button class="theme-btn" data-theme="dark" title="다크 모드">🌙</button>
                                <button class="theme-btn" data-theme="light" title="라이트 모드">☀️</button>
                            </div>
                        </div>

                        <div class="dropdown-section">
                            <span class="dropdown-section-title">언어 설정</span>
                            <div class="admin-lang-toggle">
                                <button class="lang-btn active" data-lang-val="ko">KOR</button>
                                <button class="lang-btn" data-lang-val="en">ENG</button>
                            </div>
                        </div>

                        <div class="dropdown-divider"></div>

                        <ul class="dropdown-menu-list">
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">👥</span>
                                    <span>관리자 명단 보기</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">⚙️</span>
                                    <span>내 프로필 설정</span>
                                </a>
                            </li>
                            <li>
                                <a href="#" class="dropdown-item">
                                    <span
                                        style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">🔒</span>
                                    <span>보안 로그 (Audit)</span>
                                </a>
                            </li>
                        </ul>

                        <div class="dropdown-divider"></div>

                        <button class="dropdown-item danger-item" id="admin-logout-btn">
                            <span
                                style="font-size:1.1rem; width:20px; display:inline-block; text-align:center;">🚪</span>
                            <span>로그아웃</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content (Reservations) -->
        <main class="admin-main">
            <div class="admin-page-header">
                <h1 class="admin-page-title">예약/결제/환불 관리</h1>
                <p id="reservations-range-caption"
                    style="margin-top:8px; color:var(--admin-text-secondary); font-size:0.95rem;">
                    최근 1달 예약만 표시하며, 페이지당 10건씩 보여줍니다.
                </p>
            </div>

            <div class="admin-reservations-quick-actions">
                <button class="admin-btn admin-btn-outline">환불 일괄 처리</button>
                <button class="admin-btn admin-btn-primary">수기 등록</button>
            </div>

            <!-- Action Bar -->
            <div class="admin-table-actions admin-reservations-toolbar">
                <div class="admin-reservations-toolbar-left">
                    <div class="admin-reservations-search-group">
                        <input type="text" placeholder="예약번호 또는 고객명 검색...">
                        <button class="admin-btn admin-btn-outline">검색</button>
                    </div>
                    <div class="admin-subfilter-control" id="reservation-domain-filters">
                        <button class="subfilter-btn active" data-domain-key="all">전체</button>
                        <button class="subfilter-btn" data-domain-key="flight">항공권</button>
                        <button class="subfilter-btn" data-domain-key="hotel">호텔</button>
                        <button class="subfilter-btn" data-domain-key="rentcar">렌터카</button>
                        <button class="subfilter-btn" data-domain-key="voucher">바우처</button>
                    </div>
                </div>
                <div class="admin-segment-control" id="admin-domain-filters">
                    <button class="segment-btn active" data-domain="booking">예약</button>
                    <button class="segment-btn" data-domain="payment">결제</button>
                    <button class="segment-btn" data-domain="refund">환불</button>
                    <button class="segment-btn" data-domain="traveler">탑승객/이용자</button>
                </div>
            </div>

            <!-- Reservation Data Table -->
            <div class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>번호</th>
                            <th>도메인</th>
                            <th>예약 / 결제 정보</th>
                            <th>고객 / 연락처</th>
                            <th>금액</th>
                            <th>일시</th>
                            <th>상태</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="reservations-table-body">
                        <!-- Populated Reactively by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Pagination Mock -->
            <div id="reservations-pagination"
                style="display:flex; justify-content:center; margin-top:20px; gap:8px;">
                <button class="admin-btn admin-btn-outline" id="reservations-page-prev" type="button" disabled>&lt;</button>
                <button class="admin-btn admin-btn-primary" id="reservations-page-indicator" type="button" disabled>0 / 0</button>
                <button class="admin-btn admin-btn-outline" id="reservations-page-next" type="button" disabled>&gt;</button>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script th:src="@{/front-mirror/admin/js/rbac_config.js}" src="/front-mirror/admin/js/rbac_config.js"></script>
    <script th:src="@{/front-mirror/admin/js/sidebar_ui.js}" src="/front-mirror/admin/js/sidebar_ui.js"></script>
    <script th:src="@{/front-mirror/admin/js/store.js}" src="/front-mirror/admin/js/store.js"></script>
    <script th:src="@{/front-mirror/admin/js/portal_nav.js}" src="/front-mirror/admin/js/portal_nav.js"></script>
    <script th:src="@{/front-mirror/admin/js/reservations.js}" src="/front-mirror/admin/js/reservations.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) lucide.createIcons();
        });
    </script>
</body>

</html>
