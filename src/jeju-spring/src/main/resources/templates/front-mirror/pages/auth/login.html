<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>로그인 | 제주그룹</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 메인과 동일 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" th:href="@{/front-mirror/styles/globals.css}" href="/front-mirror/styles/globals.css">
  <link rel="stylesheet" th:href="@{/front-mirror/components/react/layout/header.css}" href="/front-mirror/components/react/layout/header.css">
  <link rel="stylesheet" th:href="@{/front-mirror/components/react/layout/mega-menu.css}" href="/front-mirror/components/react/layout/mega-menu.css">
  <link rel="stylesheet" th:href="@{/front-mirror/components/react/layout/footer.css}" href="/front-mirror/components/react/layout/footer.css">
  <link rel="stylesheet" th:href="@{/front-mirror/pages/auth/login.css}" href="/front-mirror/pages/auth/login.css">
</head>

<body class="login-page">
  <div id="jeju-page-shell-header"></div>

  <section class="user_wrap">
    <div id="jeju-login-app">
      <div class="user_box inner2 login-card">
        <div class="login-header">
          <h1 class="login-title" data-lang="loginTitle">로그인</h1>
          <p class="login-desc" data-lang="loginDesc">포인트 적립에서 운임 할인까지 회원 전용 혜택을 받아보세요.</p>
        </div>

        <form id="user_form" class="login-form">
          <div class="input_group">
            <label data-lang="emailLabel">이메일/아이디</label>
            <input type="text" id="id" placeholder="아이디 또는 이메일을 입력해 주세요" required>
          </div>

          <div class="input_group">
            <label data-lang="passwordLabel">비밀번호</label>
            <input type="password" id="pw" placeholder="비밀번호를 입력해 주세요" required>
          </div>

          <div id="login-error-wrapper" class="error-wrapper" style="display: none;">
            <p class="error-msg" data-lang="loginError">등록되지 않은 아이디이거나 아이디와 비밀번호가 일치하지 않습니다.</p>
          </div>

          <div class="login_options">
            <label class="remember-me">
              <input type="checkbox" id="saveId">
              <span data-lang="saveId">아이디 저장</span>
            </label>
            <div class="nav-links">
              <a href="#" data-lang="findIdPw">아이디/비밀번호 찾기</a>
              <span class="divider">|</span>
              <a href="#" class="route-link" data-route="AUTH.SIGNUP" data-lang="signup">회원가입</a>
            </div>
          </div>

          <button type="submit" class="login-btn btn" data-lang="loginButton">로그인</button>

          <div class="quick_login">간편 로그인</div>

          <div class="sns_login">
            <button type="button" class="sns_btn naver" id="naverLoginBtn">
              <span aria-hidden="true">N</span>
              네이버로 로그인
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <div id="jeju-page-shell-footer"></div>

  <button class="top-btn" id="topBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script type="module" th:src="@{/front-mirror/components/runtime/bootstrap.js}" src="/front-mirror/components/runtime/bootstrap.js"></script>
</body>

</html>
