<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <base th:href="@{/front-mirror/jejuair/}" href="/front-mirror/jejuair/">
  <title>제주항공</title>
  <link rel="ico" th:href="@{/front-mirror/jejuair/favicon.ico}" href="/front-mirror/jejuair/favicon.ico">
  <link rel="stylesheet" th:href="@{/front-mirror/jejuair/css/common.css}" href="/front-mirror/jejuair/css/common.css">
  <link rel="stylesheet" th:href="@{/front-mirror/jejuair/css/header.css}" href="/front-mirror/jejuair/css/header.css">
  <link rel="stylesheet" th:href="@{/front-mirror/jejuair/css/footer.css}" href="/front-mirror/jejuair/css/footer.css">
  <link rel="stylesheet" th:href="@{/front-mirror/jejuair/css/Availability.css}" href="/front-mirror/jejuair/css/Availability.css">
</head>

<body class="jejuair-main-content">
  <header id="header_wrap"></header>

  <section class="reservation_wrap">
    <div class="inner2">
      <!-- 탭 -->
      <div class="reservation_tabs">
        <div class="reservation_tab active" data-tab="booking">항공권 예매</div>
        <div class="reservation_tab" data-tab="reserve">예약 조회</div>
        <div class="reservation_tab" data-tab="flight">운항 조회</div>
      </div>
      <!-- ================= 항공권 예매 ================= -->
      <div class="reservation_content active" id="booking">
        <div class="trip_type booking_trip_type">
          <button class="active" data-type="round">왕복</button>
          <button data-type="oneway">편도</button>
          <button data-type="multi">다구간</button>
        </div>
        <!-- 왕복 / 편도 -->
        <div class="trip_form trip_round active">
          <div class="form_row">
            <div class="form_group">
              <label>출발지</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
            <div class="swap_icon">
              <span class="swap_symbol">↔</span>
            </div>
            <div class="form_group">
              <label>도착지</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
          </div>
          <div class="form_row">
            <div class="form_group">
              <label>탑승일</label>
              <input class="date_input" readonly placeholder="탑승일을 선택해 주세요">
            </div>
            <div class="form_group">
              <label>탑승객</label>
              <input readonly placeholder="성인 1">
              <div class="dropdown">
                <div class="passenger_row">
                  <span>성인</span>
                  <div class="counter">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                  </div>
                </div>
                <div class="passenger_row">
                  <span>소아</span>
                  <div class="counter">
                    <button>-</button>
                    <span>0</span>
                    <button>+</button>
                  </div>
                </div>
                <div class="passenger_row">
                  <span>유아</span>
                  <div class="counter">
                    <button>-</button>
                    <span>0</span>
                    <button>+</button>
                  </div>
                </div>
                <button class="passenger_apply_btn">적용</button>
              </div>
            </div>
          </div>
          <!-- 결제/할인 -->
          <div class="payment_section">
            <label>결제 방법</label>
            <div class="payment_options">
              <label><input type="radio" name="pay" checked> 일반</label>
              <label><input type="radio" name="pay"> 포인트</label>
              <label><input type="radio" name="pay"> 기프티켓</label>
            </div>
          </div>
          <div class="discount_section">
            <label class="form_group">할인 방법</label>
            <input type="text" placeholder="프로모션 코드를 입력해 주세요!">
            <button class="coupon_btn">운임 할인 쿠폰 ></button>
          </div>
          <button class="search_btn">항공권 검색</button>
        </div>
        <!-- 다구간 -->
        <div class="trip_form trip_multi">
          <div class="form_row">
            <div class="form_group">
              <label>출발지 (1구간)</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
            <div class="form_group">
              <label>도착지 (1구간)</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
            <div class="form_group">
              <label>탑승일 (1구간)</label>
              <input class="date_input" readonly placeholder="탑승일을 선택해 주세요">
            </div>
          </div>
          <div class="form_row">
            <div class="form_group">
              <label>출발지 (2구간)</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
            <div class="form_group">
              <label>도착지 (2구간)</label>
              <input placeholder="도시/지역 입력" autocomplete="off">
              <div class="dropdown">
                <ul></ul>
              </div>
            </div>
            <div class="form_group">
              <label>탑승일 (2구간)</label>
              <input class="date_input" readonly placeholder="탑승일을 선택해 주세요">
            </div>
          </div>
          <button class="search_btn">항공권 검색</button>
        </div>
      </div>
      <!-- ================= 예약 조회 ================= -->
      <div class="reservation_content" id="reserve">
        <div class="form_row">
          <div class="form_group">
            <label>예약번호</label>
            <input placeholder="예약번호">
          </div>
        </div>
        <div class="form_row">
          <div class="form_group">
            <label>탑승일</label>
            <input class="date_input" readonly placeholder="탑승일을 선택해 주세요">
          </div>
        </div>
        <div class="form_row">
          <div class="form_group">
            <label>성 (Last Name)</label><input>
          </div>
          <div class="form_group">
            <label>이름 (First Name)</label><input>
          </div>
        </div>
        <ul class="info_list">
          <li>- 여행사, 공항, 비회원 예약도 조회 가능합니다.</li>
          <li>- 국제선은 영문명을 입력해 주세요.</li>
        </ul>
        <button class="search_btn">예약 조회</button>
      </div>
      <!-- ================= 운항 조회 ================= -->
      <!-- ================= 운항 조회 ================= -->
      <div class="reservation_content" id="flight">
        <div class="form_row">
          <div class="form_group">
            <label>출발지</label>
            <input placeholder="도시/지역 입력" autocomplete="off">
            <div class="dropdown">
              <ul></ul>
            </div>
          </div>
          <div class="form_group">
            <label>도착지</label>
            <input placeholder="도시/지역 입력" autocomplete="off">
            <div class="dropdown">
              <ul></ul>
            </div>
          </div>
        </div>
        <div class="form_row">
          <div class="form_group">
            <label>탑승일</label>
            <input class="date_input" readonly placeholder="탑승일을 선택해 주세요">
          </div>
        </div>
        <div class="payment_options">
          <label><input type="radio" name="type" checked> 왕복</label>
          <label><input type="radio" name="type"> 편도</label>
        </div>
        <button class="search_btn">조회</button>
      </div>
      <div class="calendar_layer">
        <div class="calendar_dim"></div>
        <div class="calendar_box">
          <header class="calendar_header">
            <button class="cal_prev">‹</button>
            <div class="cal_title">
              <span class="month_left"></span>
              <span class="month_right"></span>
            </div>
            <button class="cal_next">›</button>
          </header>
          <div class="calendar_body">
            <div class="calendar_month" data-pos="left"></div>
            <div class="calendar_month" data-pos="right"></div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer id="footer_wrap"></footer>
  <script>
    /* ================= 탭 전환 ================= */
    const tabs = document.querySelectorAll('.reservation_tab');
    const contents = document.querySelectorAll('.reservation_content');

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });

    const airportSearchCache = new Map();
    const airportSearchTimers = new WeakMap();
    const airportSearchLoader = (() => {
      let pending = null;

      const candidatePaths = () => {
        const dynamic = [];

        try {
          dynamic.push(new URL('../../shared/destination/generated/destination-airport-search.browser.js', document.baseURI).href);
        } catch (error) {
          /* noop */
        }

        if (window.location?.origin) {
          dynamic.push(new URL('/front-mirror/shared/destination/generated/destination-airport-search.browser.js', window.location.origin).href);
          dynamic.push(new URL('/shared/destination/generated/destination-airport-search.browser.js', window.location.origin).href);
        }

        return [...new Set(dynamic)];
      };

      const loadScript = (src) => new Promise(resolve => {
        const existing = document.querySelector(`script[data-airport-search-src="${src}"]`);
        if (existing) {
          existing.addEventListener('load', () => resolve(true), { once: true });
          existing.addEventListener('error', () => resolve(false), { once: true });
          return;
        }

        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.dataset.airportSearchSrc = src;
        script.onload = () => resolve(true);
        script.onerror = () => resolve(false);
        document.head.appendChild(script);
      });

      return async () => {
        if (window.__JEJUGROUP_DESTINATION_SEARCH__?.searchWorldAirportDestinations) {
          return window.__JEJUGROUP_DESTINATION_SEARCH__;
        }

        if (!pending) {
          pending = (async () => {
            for (const src of candidatePaths()) {
              const loaded = await loadScript(src);
              if (loaded && window.__JEJUGROUP_DESTINATION_SEARCH__?.searchWorldAirportDestinations) {
                return window.__JEJUGROUP_DESTINATION_SEARCH__;
              }
            }

            return null;
          })();
        }

        return pending;
      };
    })();
    airportSearchLoader();

    const normalizeAirportKey = value =>
      (value || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ')
        .replace(/[()[\]·\-]/g, '')
        .replace(/\./g, '');

    const escapeHtml = value =>
      String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

    const getGroupLabel = group => group.querySelector('label')?.textContent?.trim() || '';
    const isAirportSearchGroup = group => /^(출발지|도착지)/.test(getGroupLabel(group));

    const getAirportLabel = (airport) => {
      const city = airport.cityLabel || airport.cityEnglishLabel || "";
      const airportName = airport.airportLabel || airport.airportEnglishLabel || "";
      const code = airport.iata && airport.iata !== "n/a" ? ` (${airport.iata})` : "";

      if (city && airportName) {
        return `${city} - ${airportName}${code}`;
      }

      return `${airportName || city}${code}`.trim();
    };

    const buildAirportSearchKeys = (airport) => {
      const rawKeys = [
        airport.cityLabel,
        airport.cityEnglishLabel,
        airport.airportLabel,
        airport.airportEnglishLabel,
        airport.iata,
        airport.icao,
        `${airport.cityLabel || ''}${airport.airportLabel || ''}`,
        `${airport.cityEnglishLabel || ''}${airport.airportEnglishLabel || ''}`
      ];

      return [...new Set(rawKeys.map(normalizeAirportKey).filter(Boolean))];
    };

    const isStrongAirportMatch = (normalizedQuery, key) => {
      if (!normalizedQuery || !key) {
        return false;
      }

      if (key === normalizedQuery) {
        return true;
      }

      if (key.startsWith(normalizedQuery)) {
        return true;
      }

      if (normalizedQuery.length >= 3 && key.includes(normalizedQuery)) {
        return true;
      }

      return false;
    };

    const searchAirportOptions = (query) => {
      const normalizedQuery = normalizeAirportKey(query);
      if (normalizedQuery.length < 2) {
        return [];
      }

      if (airportSearchCache.has(normalizedQuery)) {
        return airportSearchCache.get(normalizedQuery);
      }

      const destinationSearch = window.__JEJUGROUP_DESTINATION_SEARCH__;
      if (!destinationSearch?.searchWorldAirportDestinations) {
        return [];
      }

      const options = destinationSearch.searchWorldAirportDestinations(query)
        .filter((airport) => {
          const keys = buildAirportSearchKeys(airport);
          return keys.some((key) => isStrongAirportMatch(normalizedQuery, key));
        })
        .map((airport) => ({
          label: getAirportLabel(airport),
          city: airport.cityLabel || airport.cityEnglishLabel || "",
          airport: airport.airportLabel || airport.airportEnglishLabel || "",
          iata: airport.iata || "",
          icao: airport.icao || ""
        }))
        .filter((option, index, list) => {
          const key = normalizeAirportKey(option.label);
          return list.findIndex((item) => normalizeAirportKey(item.label) === key) === index;
        });

      airportSearchCache.set(normalizedQuery, options);
      return options;
    };

    const renderAirportDropdown = (group, options = [], message = '') => {
      const list = group.querySelector('.dropdown ul');
      if (!list) return;

      if (!options.length) {
        list.innerHTML = `<li data-empty="true">${escapeHtml(message || '검색 결과 없음')}</li>`;
        return;
      }

      list.innerHTML = options
        .map(option => `<li data-airport-value="${escapeHtml(option.label)}" data-airport-code="${escapeHtml(option.iata || '')}" data-airport-city="${escapeHtml(option.city || '')}">${escapeHtml(option.label)}</li>`)
        .join('');
    };

    const cancelAirportSearch = group => {
      const timer = airportSearchTimers.get(group);
      if (timer) {
        clearTimeout(timer);
        airportSearchTimers.delete(group);
      }
    };

    const closeAllDropdowns = () => {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
    };

    const runAirportSearch = async (group, query) => {
      const input = group.querySelector('input');
      const dropdown = group.querySelector('.dropdown');
      if (!input || !dropdown) return;

      const trimmedQuery = query.trim();
      if (trimmedQuery.length < 2) {
        dropdown.classList.remove('active');
        return;
      }

      renderAirportDropdown(group, [], '검색 중...');
      dropdown.classList.add('active');

      await airportSearchLoader();
      if (input.value.trim() !== trimmedQuery) {
        return;
      }

      const options = searchAirportOptions(query);
      if (options.length) {
        renderAirportDropdown(group, options, '검색 결과 없음');
      } else if (window.__JEJUGROUP_DESTINATION_SEARCH__?.searchWorldAirportDestinations) {
        renderAirportDropdown(group, [], '검색 결과 없음');
      } else {
        renderAirportDropdown(group, [], '공항 검색 데이터를 불러오지 못했습니다.');
      }

      dropdown.classList.add('active');
    };

    const scheduleAirportSearch = (group, query) => {
      cancelAirportSearch(group);

      const timer = setTimeout(() => {
        runAirportSearch(group, query);
      }, 500);

      airportSearchTimers.set(group, timer);
    };

    /* ================= 드롭다운 기본 ================= */
    document.querySelectorAll('.form_group input[readonly]').forEach(input => {
      if (isAirportSearchGroup(input.closest('.form_group'))) {
        return;
      }

      input.addEventListener('click', e => {
        e.stopPropagation();
        const drop = input.nextElementSibling;
        closeAllDropdowns();
        if (drop) drop.classList.add('active');
      });
    });

    document.querySelectorAll('.form_group').forEach(group => {
      if (!isAirportSearchGroup(group)) return;

      const input = group.querySelector('input');
      const dropdown = group.querySelector('.dropdown');
      if (!input || !dropdown) return;

      const openDropdown = () => {
        closeAllDropdowns();
        dropdown.classList.add('active');
      };

      input.addEventListener('click', e => {
        e.stopPropagation();
        const query = input.value.trim();
        if (query.length >= 2) {
          openDropdown();
          scheduleAirportSearch(group, query);
          return;
        }
        dropdown.classList.remove('active');
      });

      input.addEventListener('input', () => {
        const query = input.value.trim();

        if (query.length < 2) {
          cancelAirportSearch(group);
          renderAirportDropdown(group, [], '');
          dropdown.classList.remove('active');
          return;
        }

        openDropdown();
        renderAirportDropdown(group, [], '검색 중...');
        scheduleAirportSearch(group, query);
      });

      dropdown.addEventListener('click', e => {
        const item = e.target.closest('li[data-airport-value]');
        if (!item) return;

        input.value = item.dataset.airportValue || '';
        input.dataset.airportCode = item.dataset.airportCode || '';
        input.dataset.airportCity = item.dataset.airportCity || '';
        dropdown.classList.remove('active');
      });
    });

    /* dropdown 내부 클릭 시 닫히지 않게 */
    document.querySelectorAll('.dropdown').forEach(drop => {
      drop.addEventListener('click', e => {
        e.stopPropagation();
      });
    });

    /* 출발지 / 도착지 선택 */
    document.querySelectorAll('.dropdown li').forEach(li => {
      if (li.hasAttribute('data-airport-value')) {
        return;
      }

      li.addEventListener('click', e => {
        const group = li.closest('.form_group');
        const input = group.querySelector('input');
        input.value = li.textContent;
        group.querySelector('.dropdown').classList.remove('active');
      });
    });

    /* 바깥 클릭 시 dropdown 닫기 */
    document.addEventListener('click', () => {
      closeAllDropdowns();
    });

    /* ================= 출발지 / 도착지 스왑 ================= */
    const swapBtn = document.querySelector('.swap_icon');
    if (swapBtn) {
      swapBtn.addEventListener('click', () => {
        const inputs = document.querySelectorAll('.trip_round .form_row:first-child .form_group input');
        if (inputs.length === 2) {
          const temp = inputs[0].value;
          inputs[0].value = inputs[1].value;
          inputs[1].value = temp;
        }
      });
    }

    /* ================= 왕복 / 편도 / 다구간 ================= */
    const booking = document.querySelector('#booking');
    const tripBtns = booking.querySelectorAll('.booking_trip_type button');
    const roundForm = booking.querySelector('.trip_round');
    const multiForm = booking.querySelector('.trip_multi');
    const swapSymbol = booking.querySelector('.swap_symbol');

    tripBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tripBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        roundForm.classList.remove('active');
        multiForm.classList.remove('active');

        if (btn.dataset.type === 'round') {
          roundForm.classList.add('active');
          swapSymbol.textContent = '↔';
        }

        if (btn.dataset.type === 'oneway') {
          roundForm.classList.add('active');
          swapSymbol.textContent = '→';
        }

        if (btn.dataset.type === 'multi') {
          multiForm.classList.add('active');
        }
      });
    });

    const tripTypeBtns = document.querySelectorAll('.booking_trip_type button');
    const returnDate = document.querySelector('.return_date');

    tripTypeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!returnDate) return;
        returnDate.style.display = btn.dataset.type === 'round' ? 'block' : 'none';
      });
    });

    /* ================= 날짜 최소값 설정 ================= */
    const today = new Date().toISOString().split('T')[0];
    document.querySelectorAll('input[type="date"]').forEach(date => {
      date.min = today;
    });

    /* ================= 탑승객 선택 ================= */
    const passengerGroup = document.querySelector(
      '.form_group label[textContent], .form_group'
    );

    document.querySelectorAll('.form_group').forEach(group => {
      const label = group.querySelector('label')?.textContent;
      if (label !== '탑승객') return;

      const input = group.querySelector('input[readonly]');
      const dropdown = group.querySelector('.dropdown');
      const rows = dropdown.querySelectorAll('.passenger_row');
      const applyBtn = dropdown.querySelector('.passenger_apply_btn');

      /* input 클릭 → dropdown 열기 */
      input.addEventListener('click', e => {
        e.stopPropagation();
        closeAllDropdowns();
        dropdown.classList.add('active');
      });

      /* dropdown 내부 클릭 시 닫히지 않음 */
      dropdown.addEventListener('click', e => {
        e.stopPropagation();
      });

      /* + / - 버튼 */
      rows.forEach(row => {
        const type = row.querySelector('span').textContent;
        const minus = row.querySelector('.counter button:first-child');
        const plus = row.querySelector('.counter button:last-child');
        const countEl = row.querySelector('.counter span');

        minus.addEventListener('click', e => {
          e.stopPropagation();
          let count = Number(countEl.textContent);

          if (type === '성인' && count <= 1) return;
          if (count <= 0) return;

          countEl.textContent = count - 1;
        });

        plus.addEventListener('click', e => {
          e.stopPropagation();

          const total = [...rows].reduce((sum, r) => {
            return sum + Number(r.querySelector('.counter span').textContent);
          }, 0);

          if (total >= 9) {
            alert('탑승객은 최대 9명까지 선택할 수 있습니다.');
            return;
          }

          if (type === '유아') {
            const adultRow = [...rows].find(
              r => r.querySelector('span').textContent === '성인'
            );
            const adultCount = Number(
              adultRow.querySelector('.counter span').textContent
            );

            if (Number(countEl.textContent) >= adultCount) {
              alert('유아는 성인 1명당 1명만 선택할 수 있습니다.');
              return;
            }
          }

          countEl.textContent = Number(countEl.textContent) + 1;
        });
      });

      /* 적용 버튼 */
      applyBtn.addEventListener('click', e => {
        e.stopPropagation();

        let result = [];

        rows.forEach(row => {
          const type = row.querySelector('span').textContent;
          const count = Number(row.querySelector('.counter span').textContent);
          if (count > 0) result.push(`${type} ${count}`);
        });

        input.value = result.join(', ');
        dropdown.classList.remove('active');
      });
    });

    /* 바깥 클릭 시 닫기 (탑승객만 예외) */
    document.addEventListener('click', () => {
      document.querySelectorAll('.dropdown').forEach(drop => {
        if (!drop.closest('.form_group')?.querySelector('label') ||
          drop.closest('.form_group').querySelector('label').textContent !== '탑승객') {
          drop.classList.remove('active');
        }
      });
    });

    /* 탑승일 *//* ================= 탑승일 커스텀 캘린더 ================= */

    const dateInput = document.querySelector('.date_input');
    const calendarLayer = document.querySelector('.calendar_layer');
    const dim = document.querySelector('.calendar_dim');
    const leftMonth = document.querySelector('[data-pos="left"]');
    const rightMonth = document.querySelector('[data-pos="right"]');
    const prevBtn = document.querySelector('.cal_prev');
    const nextBtn = document.querySelector('.cal_next');

    /* 상태값 */
    let baseDate = new Date();   // 기준 월
    baseDate.setDate(1);

    let departDate = null;      // 출발일
    let returnDate2 = null;      // 도착일
    let selecting = 'depart';   // depart | return

    /* input 클릭 → 캘린더 열기 */
    dateInput.addEventListener('click', () => {
      calendarLayer.classList.add('active');
      renderCalendar();
    });

    /* dim 클릭 → 닫기 */
    dim.addEventListener('click', () => {
      calendarLayer.classList.remove('active');
    });

    /* 이전 / 다음 월 */
    prevBtn.addEventListener('click', () => {
      baseDate.setMonth(baseDate.getMonth() - 1);
      renderCalendar();
    });

    nextBtn.addEventListener('click', () => {
      baseDate.setMonth(baseDate.getMonth() + 1);
      renderCalendar();
    });

    /* 캘린더 렌더 */
    function renderCalendar() {
      const left = new Date(baseDate);
      const right = new Date(baseDate.getFullYear(), baseDate.getMonth() + 1, 1);

      renderMonth(leftMonth, left);
      renderMonth(rightMonth, right);
    }

    /* 월 생성 */
    function renderMonth(target, date) {
      const year = date.getFullYear();
      const month = date.getMonth();

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      let html = `<table>
    <thead>
      <tr><th colspan="7">${year}. ${month + 1}</th></tr>
      <tr>
        <th>일</th><th>월</th><th>화</th><th>수</th>
        <th>목</th><th>금</th><th>토</th>
      </tr>
    </thead>
    <tbody><tr>`;

      for (let i = 0; i < firstDay; i++) html += `<td></td>`;

      for (let d = 1; d <= lastDate; d++) {
        const day = new Date(year, month, d);
        day.setHours(0, 0, 0, 0);

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        const disabled = day < today ? 'disabled' : '';
        const stateClass = getDateState(day);

        html += `
      <td class="${disabled} ${stateClass}" data-time="${day.getTime()}">
        ${d}
        <span class="price">${mockPrice()}</span>
      </td>
    `;

        if ((firstDay + d) % 7 === 0) html += `</tr><tr>`;
      }

      html += `</tr></tbody></table>`;
      target.innerHTML = html;

      target.querySelectorAll('td[data-time]').forEach(td => {
        if (td.classList.contains('disabled')) return;

        td.addEventListener('click', () => {
          onDateClick(new Date(Number(td.dataset.time)));
        });
      });
    }

    /* 날짜 클릭 로직 (범위 선택) */
    function onDateClick(day) {
      if (!departDate || selecting === 'depart') {
        departDate = day;
        returnDate2 = null;
        selecting = 'return';
      } else {
        if (day < departDate) {
          departDate = day;
          returnDate2 = null;
          selecting = 'return';
        } else {
          returnDate2 = day;
          selecting = 'depart';
          applyDate();
        }
      }
      renderCalendar();
    }

    /* 날짜 상태 클래스 */
    function getDateState(day) {
      if (departDate && isSame(day, departDate)) return 'start';
      if (returnDate2 && isSame(day, returnDate2)) return 'end';
      if (departDate && returnDate2 && day > departDate && day < returnDate2) {
        return 'in_range';
      }
      return '';
    }

    /* 날짜 동일 비교 */
    function isSame(a, b) {
      return a.getTime() === b.getTime();
    }

    /* input 값 반영 */
    function applyDate() {
      if (!departDate || !returnDate2) return;

      const format = d =>
        `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;

      dateInput.value = `${format(departDate)} ~ ${format(returnDate2)}`;
      calendarLayer.classList.remove('active');
    }

    const formatJourneyDate = (date) => {
      if (!(date instanceof Date) || Number.isNaN(date.getTime())) {
        return '';
      }

      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    };

    const parsePassengerCounts = (value) => {
      const counts = { adult: 1, child: 0, infant: 0 };
      const normalized = String(value || '').trim();

      if (!normalized) {
        return counts;
      }

      const adultMatch = normalized.match(/성인\s*(\d+)/);
      const childMatch = normalized.match(/소아\s*(\d+)/);
      const infantMatch = normalized.match(/유아\s*(\d+)/);

      if (adultMatch) counts.adult = Math.max(1, Number.parseInt(adultMatch[1], 10) || 1);
      if (childMatch) counts.child = Math.max(0, Number.parseInt(childMatch[1], 10) || 0);
      if (infantMatch) counts.infant = Math.max(0, Number.parseInt(infantMatch[1], 10) || 0);

      return counts;
    };

    const BOOKING_DRAFT_STORAGE_KEY = 'jejuair:booking-draft';
    const BOOKING_HANDOFF_STORAGE_KEY = 'jejuair:booking-handoff';
    const BOOKING_HANDOFF_WINDOW_NAME_PREFIX = 'jejuair:booking-handoff:v1:';
    const BOOKING_DRAFT_SOURCE = 'SERVICES.AIR.BOOKING.AVAILABILITY';
    const BOOKING_HANDOFF_TTL_MS = 2 * 60 * 1000;
    const generateDraftId = () => {
      if (window.crypto?.randomUUID) {
        return window.crypto.randomUUID();
      }

      return `draft-${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;
    };

    const collectJourneyPayload = () => {
      const tripType = document.querySelector('.booking_trip_type button.active')?.dataset.type || 'round';
      const roundInputs = document.querySelectorAll('.trip_round .form_row:first-child .form_group input');
      const passengerInput = [...document.querySelectorAll('.trip_round .form_group')]
        .find(group => group.querySelector('label')?.textContent === '탑승객')
        ?.querySelector('input[readonly]');

      const departure = roundInputs[0]?.value?.trim() || '';
      const destination = roundInputs[1]?.value?.trim() || '';
      const passengers = passengerInput?.value?.trim() || '성인 1';
      const passengerCounts = parsePassengerCounts(passengers);

      const payload = new URLSearchParams();
      payload.set('tripType', tripType);
      payload.set('departure', departure);
      payload.set('destination', destination);
      payload.set('travelDate', formatJourneyDate(departDate));
      payload.set('returnDate', tripType === 'round' ? formatJourneyDate(returnDate2) : '');
      payload.set('tripDays', tripType === 'round' && departDate && returnDate2
        ? String(Math.max(1, Math.round((returnDate2.getTime() - departDate.getTime()) / 86400000)))
        : tripType === 'oneway'
          ? '0'
          : '');
      payload.set('passengers', passengers);
      payload.set('adultCount', String(passengerCounts.adult));
      payload.set('childCount', String(passengerCounts.child));
      payload.set('infantCount', String(passengerCounts.infant));
      payload.set('sourceRoute', BOOKING_DRAFT_SOURCE);
      payload.set('sourcePage', window.location.pathname);

      if (tripType === 'multi') {
        const multiRows = [...document.querySelectorAll('.trip_multi .form_row')].map(row => {
          const groups = row.querySelectorAll('.form_group');
          const segmentDate = row.querySelector('.date_input');

          return {
            departure: groups[0]?.querySelector('input')?.value?.trim() || '',
            destination: groups[1]?.querySelector('input')?.value?.trim() || '',
            travelDate: formatJourneyDate(new Date(segmentDate?.value || '')),
          };
        }).filter(segment => segment.departure || segment.destination || segment.travelDate);

        if (multiRows.length) {
          payload.set('segments', JSON.stringify(multiRows));
          payload.set('departure', multiRows[0]?.departure || departure);
          payload.set('destination', multiRows[multiRows.length - 1]?.destination || destination);
          payload.set('travelDate', multiRows[0]?.travelDate || formatJourneyDate(departDate));
          payload.set('returnDate', multiRows[multiRows.length - 1]?.travelDate || '');
          payload.set('tripDays', multiRows.length > 1 ? String(multiRows.length - 1) : '0');
        }
      }

      const adultBase = 89000;
      const childBase = 67000;
      const infantBase = 20000;
      const tripMultiplier = {
        round: 1.85,
        oneway: 1,
        multi: 2.15,
      }[tripType] || 1;
      const baseTotal =
        passengerCounts.adult * adultBase +
        passengerCounts.child * childBase +
        passengerCounts.infant * infantBase;
      const total = Math.max(1000, Math.round((baseTotal * tripMultiplier) / 1000) * 1000);

      payload.set('total', String(total));
      return payload;
    };

    const persistJourneyDraft = (payload, handoffId) => {
      if (!(payload instanceof URLSearchParams)) {
        return;
      }

      try {
        const savedAt = new Date().toISOString();
        const draft = {
          ...Object.fromEntries(payload.entries()),
          handoffId,
          savedAt,
          sourceRoute: BOOKING_DRAFT_SOURCE,
          sourcePage: window.location.pathname,
        };
        window.sessionStorage.setItem(BOOKING_DRAFT_STORAGE_KEY, JSON.stringify(draft));

        if (handoffId) {
          window.name = `${BOOKING_HANDOFF_WINDOW_NAME_PREFIX}${JSON.stringify({
            handoffId,
            draftId: draft.draftId || '',
            savedAt,
            expiresAt: new Date(Date.now() + BOOKING_HANDOFF_TTL_MS).toISOString(),
            sourceRoute: BOOKING_DRAFT_SOURCE,
            sourcePage: window.location.pathname,
            oneShot: true,
          })}`;

          window.sessionStorage.setItem(BOOKING_HANDOFF_STORAGE_KEY, JSON.stringify({
            handoffId,
            draftId: draft.draftId || '',
            savedAt,
            expiresAt: new Date(Date.now() + 15 * 60 * 1000).toISOString(),
            sourceRoute: BOOKING_DRAFT_SOURCE,
            sourcePage: window.location.pathname,
            oneShot: true,
          }));
        }
      } catch (_error) {
        /* sessionStorage unavailable */
      }
    };

    /* 임시 요금 */
    function mockPrice() {
      const price = [38900, 41900, 44900, 50900, 59900, 68900];
      return price[Math.floor(Math.random() * price.length)].toLocaleString();
    }

    /* 결제 페이지 연결 */
    document.querySelectorAll('#booking .search_btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const payload = collectJourneyPayload();
        const draftId = generateDraftId();
        const handoffId = generateDraftId();
        payload.set('draftId', draftId);
        payload.set('handoffId', handoffId);
        persistJourneyDraft(payload, handoffId);
        const params = Object.fromEntries(payload.entries());
        const fallbackUrl = `/jejuair/pages/booking/payment.html?${payload.toString()}`;

        if (window.jejuAirRoute?.navigate) {
          Promise.resolve(
            window.jejuAirRoute.navigate("SERVICES.AIR.BOOKING.PAYMENT", params),
          ).catch(() => {
            window.location.href = fallbackUrl;
          });
          return;
        }

        window.location.href = fallbackUrl;
      });
    });

    /* 나머지 버튼은 기존 임시 동작 유지 */
    document.querySelectorAll('#reserve .search_btn, #flight .search_btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.add('loading');
        setTimeout(() => {
          btn.classList.remove('loading');
          alert('조회 결과 페이지 연결 예정입니다.');
        }, 800);
      });
    });
  </script>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script th:src="@{/front-mirror/jejuair/js/header.js}" src="/front-mirror/jejuair/js/header.js"></script>
  <script th:src="@{/front-mirror/jejuair/js/footer.js}" src="/front-mirror/jejuair/js/footer.js"></script>
</body>
