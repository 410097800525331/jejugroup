goal: >
  Migrate jeju-spring from Maven to Gradle while preserving the existing Spring
  Boot WAR packaging model for JDK 21 and external Tomcat 10.1.
constraints:
  - Keep the module as a Spring Boot WAR project targeting external Tomcat 10.1.
  - Keep Java 21 as the required runtime baseline.
  - Preserve the current front-asset sync step that runs before Spring build/test/package commands.
  - Update root helper scripts and primary docs so the default jeju-spring workflow uses Gradle, not Maven.
  - Use a Gradle wrapper-based workflow; do not require a globally installed Gradle.
  - Do not change application-domain logic, routes, templates, or persistence behavior in this slice.
  - Prefer Groovy DSL unless an existing repository convention requires otherwise.
acceptance_criteria:
  - jeju-spring builds from Gradle files instead of pom.xml and Maven wrapper files.
  - jeju-spring contains a working Gradle wrapper configuration for the chosen Gradle version.
  - Root scripts `spring:run`, `spring:test`, and `spring:war-package` execute through a Gradle-based helper instead of the Maven helper.
  - Primary jeju-spring build docs describe the Gradle workflow and no longer present Maven as the default build tool.
  - The Gradle build still packages WAR output suitable for external Tomcat 10.1 on JDK 21.
verification:
  - Run pnpm run guard:text.
  - Run pnpm run spring:test.
  - Run pnpm run spring:war-package.
  - Review changed files to confirm no primary script or primary doc still points the default jeju-spring workflow at Maven.
out_of_scope:
  - Env-source migration or DB schema changes.
  - Rewriting front -> jeju-spring mirroring behavior beyond keeping the existing pre-build sync step wired in.
  - Broader repository-wide deployment pipeline replacement outside the jeju-spring Gradle workflow.
