goal: >
  Restore the companion-management modal design on the mypage itinerary flow
  by isolating its styles from the personal-info edit modal and re-establishing
  the intended spacing, hierarchy, and list/input layout.
constraints:
  - Only edit front/components/react/mypage/CompanionModal.tsx and front/pages/mypage/styles/_modal.css.
  - Do not edit jeju-web or jeju-spring mirror paths directly.
  - Keep the existing hybrid shell + React island architecture intact.
  - Preserve modal behavior, companion add/remove/save actions, and the linked avatar badge pattern.
  - Do not regress the separate personal-info edit modal styling.
acceptance_criteria:
  - The companion-management modal no longer inherits broken spacing/layout from the personal-info edit modal.
  - The modal title, description, input row, companion list rows, and footer actions have a coherent dedicated layout again.
  - The linked companion avatar and svg badge still render correctly inside the modal list.
  - Personal-info modal styles continue to work after the companion modal isolation.
verification:
  - Run pnpm run guard:text.
  - Run pnpm run build:front.
  - Review the companion modal markup/CSS to confirm it uses dedicated companion-modal selectors instead of relying only on shared generic selectors.
out_of_scope:
  - Backend/session changes.
  - Direct edits to deployment mirrors under jeju-web or jeju-spring.
  - Redesigning unrelated mypage sections.
