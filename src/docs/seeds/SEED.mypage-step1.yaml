goal: >
  Centralize the mypage itinerary and support data into the shared dashboard
  snapshot/state flow so the dashboard becomes a consumer of one contract
  without changing the current design or current visible fallback content.
constraints:
  - Only edit front source-of-truth files under front/components/react/mypage and this seed file.
  - Do not change CSS, layout structure, copy styling, or existing visible design.
  - Preserve the current fallback itinerary and support content for this stage.
  - Preserve the current manual companion-management behavior and current local itinerary interactions for this stage.
  - Do not introduce purchase-flow hardcoding, automatic usage-status logic, or DB/API dependencies in this stage.
acceptance_criteria:
  - DashboardSnapshot and DashboardState carry itinerary and support data alongside profile, stats, and bookings.
  - The mypage fallback snapshot provides itinerary and support data through the shared contract rather than component-local constants only.
  - ItinerarySection reads and updates itinerary data through the shared dashboard state instead of owning a separate hardcoded local source.
  - SupportSection reads support items from the shared dashboard state instead of importing a component-local constant directly.
  - The rendered mypage design remains visually unchanged after the refactor.
verification:
  - Run pnpm run build:front.
  - Review the changed mypage components to confirm itinerary and support rendering still matches the current screen structure.
out_of_scope:
  - Purchase-flow mock order generation in 제주에어, 스테이, 렌터카, 액티비티, or voucher pages.
  - Automatic used/cancelled itinerary status modeling.
  - Removing the current manual checklist interactions.
  - DB, API, or deployment-mirror changes.
