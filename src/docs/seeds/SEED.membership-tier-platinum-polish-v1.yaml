goal: Polish the platinum-only membership tier so it stays blue-white and metallic, but reads slightly deeper and more premium without changing silver.
background: >
  This is a frozen front-authored visual contract for the landing and mypage
  membership surfaces. Silver must remain unchanged as the neutral comparison
  tier. Platinum may be tuned a little darker/richer, but only within the
  existing blue-white metallic identity. Front stays the source of truth, and
  jeju-spring may only receive derived mirror output from the front change.
in_scope:
  - Landing membership visuals in front source
  - Mypage membership/profile visuals in front source
  - Derived jeju-spring mirror output produced from the front change
out_of_scope:
  - Direct edits to jeju-web/src/main/webapp/**
  - Direct hand edits to jeju-spring/**
  - Silver tier styling changes
  - Layout, copy, behavior, or data-flow changes unrelated to platinum polish
constraints:
  - Keep silver exactly as the neutral baseline tier.
  - Keep platinum blue-white, metallic, and clearly distinct from silver.
  - Make platinum slightly deeper, richer, and more premium, not brighter or warmer.
  - Touch only front source files for landing and mypage.
  - Do not edit jeju-web directly.
  - Do not hand-edit jeju-spring; only derived mirror updates may change there.
acceptance_criteria:
  - Silver looks unchanged relative to the current baseline.
  - Platinum still reads as blue-white metallic, but with a subtly deeper premium finish.
  - Landing and mypage share the same platinum-only polish language.
  - No unrelated layout, copy, or interaction regressions are introduced.
  - The jeju-spring mirror reflects the same front-authored styling.
verification:
  - Review the diff for the affected front membership style changes.
  - Run the relevant repo checks for the changed front styles and pages.
  - Confirm silver remains visually stable while platinum gains the deeper premium finish.
  - Confirm the derived spring output matches the front-authored styling.
