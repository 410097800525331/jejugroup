goal: >
  bookings 공통 모델은 유지하면서, admin IA에 맞춰 숙소 축은 hotel_* 도메인 명명으로 정리하고
  flight, rentcar, special, usim, admin 보조 테이블을 추가하는 DB 스키마 refactor 계약을 고정한다.
constraints:
  - bookings, booking_items, booking_passengers, payment_* 공통 예약/결제 축은 유지한다.
  - booking_passengers는 항공 전용으로 분리하지 않는다.
  - 기존 숙소 축의 generic 이름은 hotel_*로 정리한다.
  - 최소 후보 테이블은 properties, property_room_types, property_benefits, property_display_overrides, property_tags, inventory_stocks, inventory_adjustments, price_policies를 포함한다.
  - front/admin/js/lodging.js 기준으로 flight, rentcar, special, usim 상품 관리용 마스터/재고 테이블을 추가한다.
  - front/admin/js/members.js, cms.js, reservations.js, dashboard.js 기준으로 기존 테이블 comments를 더 명확히 보강하고 필요한 경우 admin_role_scopes, dashboard_metric_snapshots 같은 보조 테이블을 추가한다.
  - 계약은 기존 테이블과 front/admin 경로 매핑이 정리되도록 유지한다.
  - 스키마는 admin IA와 bookings-common 축을 동시에 만족해야 하며, 네이밍은 domain-first로 일관시킨다.
acceptance_criteria:
  - bookings-common 축과 payment_* 축이 유지되고, booking_passengers가 항공 전용 테이블로 분리되지 않는다.
  - 숙소 관련 기존 generic 테이블과 컬럼/설명은 hotel_* 네이밍과 의미로 정리된다.
  - flight, rentcar, special, usim 상품 관리에 필요한 마스터/재고 테이블이 admin IA 기준으로 추가된다.
  - members, cms, reservations, dashboard 관련 기존 테이블의 comments가 더 명확해지고, 필요 시 admin_role_scopes와 dashboard_metric_snapshots 같은 보조 테이블이 반영된다.
  - 기존 테이블과 front/admin 경로 매핑이 정리된다.
verification:
  - pnpm run spring:test
  - pnpm run spring:war-package
  - information_schema 및 SHOW CREATE TABLE inspection으로 스키마와 코멘트 반영을 확인한다.
out_of_scope:
  - front/admin UI 자체 변경
  - bookings 공통축 해체
  - 이번 계약에 없는 기능성 리팩터링
