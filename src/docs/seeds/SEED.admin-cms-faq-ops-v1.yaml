goal: admin/pages/cms.html 의 기존 FAQ segment-btn으로 전환되는 FAQ 탭을 공지사항 수준의 운영 기능으로 완성한다.
constraints:
  - front만 human-edited source of truth 유지
  - 구현 범위는 admin CMS FAQ 탭만, notices 탭 동작은 유지
  - Route B 전제이므로 main은 구현 파일을 건드리지 않음
  - FAQ 수정 시 answer/category/sortOrder/active 가 빈 값으로 덮어써지지 않도록 편집 재개 데이터가 유지돼야 함
  - 공개 FAQ 페이지 UI 개편은 out of scope
acceptance_criteria:
  - FAQ 탭에서 목록 조회/검색 가능
  - FAQ 등록 가능
  - FAQ 수정 가능
  - FAQ 삭제 가능
  - FAQ active 토글 가능
  - 기존 faq segment 전환 흐름 유지
  - notices 탭 기능 회귀 없음
verification:
  - node --check front/admin/js/cms.js
  - D:\lsh\git\jejugroup\.codex-temp\gradle-8.14.4\bin\gradle.bat -p D:\lsh\git\jejugroup\jeju-spring compileJava
  - git diff --check -- front/admin/pages/cms.html front/admin/js/cms.js front/admin/css/components.css front/admin/data/cms-config.js jeju-spring/src/main/java/com/jejugroup/jejuspring/admin/web/AdminReadApiController.java docs/seeds/SEED.admin-cms-faq-ops-v1.yaml STATE.md MULTI_AGENT_LOG.md
out_of_scope:
  - public FAQ page redesign
  - jeju-spring or jeju-web mirror 직접 수정
  - notices data model change beyond preserving existing behavior
