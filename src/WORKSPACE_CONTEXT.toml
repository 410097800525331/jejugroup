version = 1

[workspace]
name = "jejugroup-landing"
display_name = "Jeju Group Landing Page"
repository_root = "D:/lsh/git/jejugroup"
primary_entry = "front/index.html"
page_url = "/index.html"
page_kind = "hybrid-static-shell"
locale = "ko-KR"

[brand]
product_name = "Jeju Group"
product_name_ko = "제주그룹"
headline = "모든 여행의 시작과 끝, 제주그룹이 함께합니다."
summary = "항공, 숙박, 렌터카, 멤버십을 한 화면에서 소개하는 메인 랜딩 페이지다."
tone = "premium, direct, travel-platform, not playful"
voice = "clear Korean marketing copy with concise benefit-first phrasing"
primary_color = "#FF5000"
base_font = "FlightSans"

[repository]
facts = [
  "Package manager: pnpm",
  "Landing source of truth: front/**",
  "Deployment mirrors: jeju-spring/**, jeju-web/src/main/webapp/** (legacy mirror)",
]

[required_context]
read = [
  "docs/transition-architecture.md",
  "docs/front-entrypoint-inventory.md",
  "docs/text-integrity-guardrails.md",
]

[architecture]
source_of_truth = "front"
shell_runtime = "front/apps/shell"
shared_react_components = "front/components/react"
landing_script = "front/core/pages/landing/main.js"
landing_stylesheet = "front/styles/globals.css"
header_component = "front/components/react/layout/MainHeaderTemplate.tsx"
footer_component = "front/components/react/layout/MainFooterTemplate.tsx"
route_constants = "front/core/modules/constants/routes.module.js"
webapp_mirror = "jeju-web/src/main/webapp"
spring_mirror = "jeju-spring"
webapp_mirror_role = "deployment mirror only, never primary edit target"
spring_mirror_role = "Spring Boot + Thymeleaf deployment mirror only, never primary frontend source"
legacy_webapp_role = "historically mirrored front assets and JSP-converted outputs, but now legacy-only because the final runtime baseline is jeju-spring"

[editing_rules]
edit_in = [
  "front/index.html",
  "front/styles/globals.css",
  "front/core/pages/landing/main.js",
  "front/apps/shell/**",
  "front/components/react/layout/**",
  "front/components/react/widget/**",
  "front/core/modules/constants/routes.module.js",
]
do_not_edit = [
  "jeju-web/src/main/webapp/**",
  "jeju-spring/**",
  "front/components/runtime/**",
  "front/.generated/**",
  "front/pages/**/assets/*.js",
  "front/pages/**/assets/*.css",
]
notes = [
  "landing page changes start from front and only sync to mirrors through the existing pipeline",
  "jejuair is a fixed static area, but the landing page can still route users into it",
  "shell header, footer, weather widget, FAB, and route navigation behavior are shared assets",
]

[workflow]
authoring_root = "front"
authoring_model = "front is the only human-edited frontend source of truth"
current_working_style = "hybrid static HTML + shell runtime + selective React islands"
front_work_areas = [
  "page markup and page-specific CSS live under front/**/pages/**",
  "shared shell runtime lives under front/apps/shell/**",
  "shared React UI and layout pieces live under front/components/react/**",
  "routes and runtime helpers are maintained under front/core/**",
]
delivery_flow = [
  "edit and verify in front first",
  "sync to jeju-spring through the existing spring mirror scripts, and keep jeju-web only for legacy compatibility",
  "treat jeju-spring as the Spring Boot + Thymeleaf deployment-side mirror/runtime",
  "treat jeju-web as a legacy deployment mirror, not a source workspace",
]
legacy_transition_note = "jeju-web remains only as a legacy compatibility mirror, while the default deployment path and runtime baseline are jeju-spring"

[deployment_target]
final_goal = "Spring Boot + Thymeleaf server deployment"
server_runtime = "Spring Boot WAR + Thymeleaf"
frontend_role = "front prepares the source assets and templates that feed deployment mirrors"
mirror_policy = "jeju-spring is the default deployment/runtime mirror and jeju-web is the legacy compatibility mirror derived from front-led work"
final_execution_mode = "WAR deployment to an external Tomcat server"
runtime_version_policy = "final JDK and Tomcat versions are not fixed yet"
oracle_cloud_timing = "final deployment runtime versions will be fixed during the Oracle Cloud transition"

[version_policy]
status = "pending"
current_jeju_spring_baseline = "Java 21 + WAR packaging"
final_jdk_version = "pending"
final_tomcat_version = "pending"
note = "final runtime versions will be decided at Oracle Cloud migration time"

[deployment_current]
frontend_source = "front"
active_deploy_base = "jeju-spring final runtime baseline ROOT.war"
deploy_target = "alwaysdata"
deploy_method = "custom deployment script uploads the jeju-spring ROOT.war to alwaysdata first"
shared_env_source = "jeju-spring/.env"
shared_db_source = "runtime env keys owned by jeju-spring/.env"
runtime_summary = "jeju-spring final runtime baseline + WAR deployment"
notes = [
  "front is edited as the source and mirrored into jeju-spring for the default deployment path",
  "jeju-spring now owns the shared env baseline; jeju-web/.env is historical only",
]

[deployment_goal]
primary_runtime = "jeju-spring centered Spring Boot + Thymeleaf server deployment"
target_execution_mode = "WAR deployment to an external Tomcat server"
target_platform = "Oracle Cloud"
oracle_cloud_priority = "planned final production platform"
env_source_goal = "move env source of truth from jeju-web to jeju-spring"
notes = [
  "jeju-web is not the long-term deployment center",
  "the long-term direction is jeju-spring, not continued jsp-first expansion",
]

[oracle_cloud]
status = "pending"
preferred_candidate = "VM + external Tomcat + WAR deployment"
docker_plan = "undecided"

[env_strategy]
current_env_source_of_truth = "jeju-spring/.env"
current_usage = "jeju-spring reads the shared env from jeju-spring/.env by default"
future_plan = "keep jeju-web/.env as a historical compatibility reference and preserve JEJU_SHARED_ENV_PATH override behavior"
target_env_source_of_truth = "jeju-spring runtime env"

[ux]
scroll_mode = "custom full-page section scroll with footer stop"
navigation_mode = "header hash navigation for in-page sections plus route-link navigation for service pages"
language_toggle = true
weather_widget = true
video_transition = true
membership_section = true

[[sections]]
id = "section-1"
name = "hero"
purpose = "brand reveal with full-screen travel video and scroll cue"
primary_assets = [
  "front/index.html",
  "front/styles/globals.css",
]

[[sections]]
id = "section-2"
name = "air service"
purpose = "introduce Jeju Air and route users to the air service main page"
route_key = "SERVICES.AIR.MAIN"

[[sections]]
id = "section-3"
name = "stay service"
purpose = "introduce Jeju Stay and route users to the hotel landing page"
route_key = "SERVICES.STAY.MAIN"

[[sections]]
id = "section-4"
name = "rent car service"
purpose = "introduce rental cars and route users to the external rent-car site"
route_key = "SERVICES.RENT_CAR"

[[sections]]
id = "section-5"
name = "membership"
purpose = "show tiered membership benefits and pricing in a premium sales layout"

[routes]
home = "/index.html"
air_main = "/jejuair/index.html"
stay_main = "/jejustay/pages/hotel/jejuhotel.html"
stay_hotel_list = "/jejustay/pages/hotel/hotel-list.html"
customer_center = "/pages/cs/customer_center.html"
login = "/pages/auth/login.html"
signup = "/pages/auth/signup.html"
rent_car_external = "https://jejurentcar.netlify.app/"

[content_guidelines]
keep_core_services = [
  "air",
  "stay",
  "rent car",
  "membership",
]
prefer_copy_traits = [
  "benefit-first",
  "premium but not luxury-for-luxury's-sake",
  "clear CTA labels",
  "travel-platform consistency across Korean and English text",
]
avoid = [
  "generic startup copy",
  "purple-heavy visuals",
  "removing Jeju Group orange as the primary accent",
  "turning the landing page into a pure React app without an explicit architecture decision",
]

[approval]
zones = [
  "alwaysdata 배포 스크립트 실행",
  "ROOT.war 패키징 또는 업로드 방식 변경",
  "jeju-spring/.env changes or legacy-only jeju-web/.env reference",
  "Oracle Cloud 전환 관련 설정 변경",
  "jeju-web/src/main/webapp/** 또는 jeju-spring/** 직접 수정",
]

[workers]
mapping = [
  "worker_shell_runtime = front/apps/shell/**, front/core/modules/constants/routes.module.js",
  "worker_layout = front/components/react/layout/**",
  "worker_widget = front/components/react/widget/**",
  "worker_feature_landing = front/index.html, front/core/pages/landing/main.js, front/styles/globals.css",
]

[reviewer]
focus = [
  "landing shell header/footer mount integrity",
  "section hash navigation and top button behavior",
  "video transition CTA interception",
  "language toggle copy update",
  "mirror boundary violations",
]
