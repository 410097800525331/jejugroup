<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/common :: pageHead(${passAuthPage.title})}"></th:block>
    <link rel="stylesheet" th:href="@{/assets/css/auth/pass-auth.css}" href="/assets/css/auth/pass-auth.css">
    <script src="https://www.google.com/recaptcha/api.js?render=explicit" async defer></script>
</head>
<body class="auth-pass-page" th:attr="data-shell=${passAuthPage.shell}">
<main class="pass-page-shell" id="auth-pass-page"
      th:attr="
        data-verify-path=${passAuthPage.verifyPath},
        data-login-path=${passAuthPage.loginPath},
        data-signup-path=${passAuthPage.signupPath},
        data-migration-path=${passAuthPage.migrationPath},
        data-fallback-site-key=${passAuthPage.testRecaptchaSiteKey}">
    <section class="pass-card">
        <header class="pass-header">
            <div class="pass-logo">PASS</div>
            <div class="pass-header-copy">
                인증부터 본인확인까지<br>
                일상으로 PASS
            </div>
        </header>

        <section class="step-head">
            <p class="eyebrow">Third Manual Migration Slice</p>
            <h1 id="pass-step-title">이용 중인 통신사를 선택해 주세요</h1>
            <div class="step-track" aria-hidden="true">
                <span class="step-dot active" data-step-dot="1">1</span>
                <span class="step-dot" data-step-dot="2">2</span>
                <span class="step-dot" data-step-dot="3">3</span>
                <span class="step-dot" data-step-dot="4">4</span>
                <span class="step-dot" data-step-dot="5">5</span>
            </div>
        </section>

        <section class="pass-screen active" data-step="1">
            <div class="telecom-grid">
                <button class="telecom-btn" data-telecom="SKT" type="button">SKT</button>
                <button class="telecom-btn" data-telecom="KT" type="button">KT</button>
                <button class="telecom-btn" data-telecom="LG U+" type="button">LG U+</button>
                <button class="telecom-btn muted" data-telecom="SKT 알뜰폰" type="button">SKT<br>알뜰폰</button>
                <button class="telecom-btn muted" data-telecom="KT 알뜰폰" type="button">KT<br>알뜰폰</button>
                <button class="telecom-btn muted" data-telecom="LG U+ 알뜰폰" type="button">LG U+<br>알뜰폰</button>
            </div>
        </section>

        <section class="pass-screen" data-step="2">
            <div class="method-list">
                <button class="method-btn" data-method="PASS" type="button">
                    <div>
                        <strong>PASS 인증</strong>
                        <p>더 빠르고 간편하게 인증 가능 상태</p>
                    </div>
                    <span>선택</span>
                </button>
                <button class="method-btn" data-method="SMS" type="button">
                    <div>
                        <strong>문자(SMS) 인증</strong>
                        <p>SMS 인증번호로 본인확인 진행 상태</p>
                    </div>
                    <span>선택</span>
                </button>
            </div>
        </section>

        <section class="pass-screen" data-step="3">
            <label class="field-group" for="pass-name-input">
                <span>이름</span>
                <input id="pass-name-input" type="text" autocomplete="name" placeholder="이름 입력">
            </label>
            <button class="pass-primary-button" id="pass-name-next" type="button">다음</button>
        </section>

        <section class="pass-screen" data-step="4">
            <label class="field-group" for="pass-name-display">
                <span>이름</span>
                <input id="pass-name-display" type="text" readonly>
            </label>

            <div class="identity-row">
                <label class="field-group" for="pass-birth-input">
                    <span>생년월일 6자리</span>
                    <input id="pass-birth-input" type="text" inputmode="numeric" maxlength="6" placeholder="YYMMDD">
                </label>
                <label class="field-group rrn-field" for="pass-rrn-input">
                    <span>뒤 첫 자리</span>
                    <input id="pass-rrn-input" type="text" inputmode="numeric" maxlength="1" placeholder="1-8">
                </label>
            </div>

            <label class="field-group hidden" id="pass-phone-group" for="pass-phone-input">
                <span>휴대폰 번호</span>
                <input id="pass-phone-input" type="text" inputmode="numeric" maxlength="13" placeholder="010-1234-5678">
            </label>

            <div class="captcha-box hidden" id="pass-captcha-box">
                <div id="pass-recaptcha-host"></div>
            </div>

            <div class="inline-meta hidden" id="pass-inline-success">보안문자 확인 완료 상태</div>
            <div class="status-banner" id="pass-status-banner" aria-live="polite" hidden></div>

            <button class="pass-primary-button" disabled id="pass-submit-button" type="button">확인</button>
        </section>

        <section class="pass-screen" data-step="5">
            <div class="waiting-box">
                <div class="loader-circle"></div>
                <strong>인증 진행 중 상태</strong>
                <p>잠시만 기다리면 회원가입 창으로 결과 전달 예정 상태</p>
            </div>
        </section>

        <footer class="pass-footer">
            이용약관 <strong>개인정보처리방침</strong><br>
            VeriSign 256-bit SSL 암호화 적용 상태
        </footer>
    </section>
</main>

<script type="module" th:src="@{/assets/js/auth/pass-auth-page.js}" src="/assets/js/auth/pass-auth-page.js"></script>
</body>
</html>
