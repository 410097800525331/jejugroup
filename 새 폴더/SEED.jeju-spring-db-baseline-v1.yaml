goal: >
  Set up the first local jeju-spring DB baseline by wiring local MySQL into the
  Gradle/Spring runtime, adding Flyway, and creating an initial schema for auth,
  RBAC, companion links, notices, FAQ, support categories, and support tickets.
constraints:
  - Use the prepared local MySQL environment as the target runtime for this slice.
  - Limit schema scope to the v1 baseline: users/profile/auth, roles/permissions, companion links, notices, FAQ, support categories, support tickets, support comments, and support attachments.
  - Do not implement booking/payment/product/CMS tables in this first DB baseline.
  - Keep the Gradle WAR workflow intact.
  - Prefer Flyway SQL migrations for schema creation.
  - Do not invent application-domain behavior beyond the agreed v1 schema scope.
acceptance_criteria:
  - jeju-spring runtime is configured so local MySQL can be used as the application datasource.
  - Flyway is added and executed as part of the jeju-spring runtime/build path.
  - A v1 migration creates the baseline tables and key constraints for users, RBAC, companion links, notices, FAQ, support categories, support tickets, support comments, and support attachments.
  - The current legacy auth/users contract remains compatible with the new baseline.
  - The build/package path still works after the DB baseline wiring.
verification:
  - Run pnpm run spring:war-package.
  - Run a local jeju-spring startup or equivalent schema-creation validation against the prepared MySQL connection.
  - Inspect the created schema to confirm the v1 tables exist.
out_of_scope:
  - Booking/payment/product/inventory/CMS schema tables.
  - Repository-wide env-source migration.
  - Support ticket business logic implementation beyond baseline schema and runtime wiring.
