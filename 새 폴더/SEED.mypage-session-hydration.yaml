goal: >
  Make the mypage dashboard reflect the logged-in user's session by hydrating
  member information, membership grade, stats, and booking data from the
  available auth session fields, while falling back to existing mock data when
  the backend session does not yet provide those fields.
constraints:
  - Only edit front source-of-truth files under front/components/react/mypage and front/pages/mypage/styles if needed for grade-class parity.
  - Do not edit jeju-web or jeju-spring mirror paths directly.
  - Keep the existing hybrid shell + React island architecture intact.
  - Use the existing userSession storage/custom event contract or the same /api/auth/session endpoint shape; do not invent a new backend API.
  - Preserve current booking/filter UI behavior, modal behavior, and shell integration.
  - If the backend session only exposes id/name/role, profile data should still personalize while stats/bookings continue to fall back safely.
acceptance_criteria:
  - The mypage dashboard reads the logged-in session and updates visible member information such as name, email, phone, and displayed grade when those fields are available.
  - The summary/booking/account sections no longer depend only on static PROFILE/STATS/BOOKINGS constants at render time.
  - Booking/stats hydration uses session-provided arrays or summary fields when present and otherwise falls back to the existing mock content without breaking the page.
  - Session changes after login/logout are reflected through the existing storage/custom-event flow or equivalent session re-resolution on mount.
  - Any membership-dependent class names used by the dashboard are derived from hydrated grade data instead of being hardcoded.
verification:
  - Run pnpm run guard:text.
  - Run pnpm run build:front.
  - Review the hydrated data path to confirm it first checks stored session data, safely handles missing fields, and keeps fallback behavior intact.
out_of_scope:
  - New backend API endpoints or database schema changes.
  - Direct edits to deployment mirrors under jeju-web or jeju-spring.
  - Replacing the existing dashboard UI with the separate Spring Thymeleaf dashboard implementation.
