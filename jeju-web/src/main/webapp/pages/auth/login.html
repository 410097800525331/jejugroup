<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>로그인 | 제주그룹</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 메인과 동일 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../../styles/globals.css">
  <link rel="stylesheet" href="../../components/layout/header/header.css">
  <link rel="stylesheet" href="../../components/layout/mega_menu/mega-menu.css">
  <link rel="stylesheet" href="../../components/layout/footer/footer.css">
  <link rel="stylesheet" href="./login.css">
</head>

<body class="login-page">
  <div id="main-header-placeholder"></div>

  <section class="user_wrap">
    <div class="user_box inner2 login-card">
      <div class="login-header">
        <h1 class="login-title" data-lang="loginTitle">로그인</h1>
        <p class="login-desc" data-lang="loginDesc">포인트 적립에서 운임할인까지 회원전용 혜택을 받아보세요.</p>
      </div>

      <form id="user_form" class="login-form">
        <div class="input_group">
          <label data-lang="emailLabel">이메일/아이디</label>
          <input type="text" id="id" placeholder="아이디 또는 이메일 입력" required>
        </div>
        <div class="input_group">
          <label data-lang="passwordLabel">비밀번호</label>
          <input type="password" id="pw" placeholder="비밀번호 입력" required>
        </div>

        <div id="login-error-wrapper" class="error-wrapper" style="display: none;">
          <p class="error-msg" data-lang="loginError">등록되지 않은 아이디이거나 아이디, 비밀번호가 일치하지 않습니다.</p>
        </div>

        <div class="login_options">
          <label><input type="checkbox"> 아이디 저장</label>
          <div class="nav-links">
            <a href="#" data-lang="findIdPw">아이디/비밀번호 찾기</a>
            <span class="divider">|</span>
            <a href="#" class="route-link" data-route="AUTH.SIGNUP" data-lang="signup">회원가입</a>
          </div>
        </div>

        <button type="submit" class="login-btn btn" data-lang="loginButton">로그인</button>
      </form>

      <div class="quick_login">3초 만에 빠른 로그인</div>
      <div class="sns_login">
        <button class="sns_btn kakao">카카오</button>
        <button class="sns_btn naver">네이버</button>
        <button class="sns_btn apple">Apple</button>
      </div>

      <div class="simple_login">
        <button class="simple_login-btn" type="button">휴대폰 간편 로그인</button>
      </div>
    </div>
  </section>

  <div id="main-footer-placeholder"></div>

  <button class="top-btn" id="topBtn">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <script src="../../core/constants/lang_data.js"></script>
  <script src="../../jejustay/pages/hotel/main.js"></script>

  <!-- Component Scripts (Must load before component_loader.js) -->
  <script src="../../components/layout/header/header.js"></script>
  <script src="../../components/layout/mega_menu/mega-menu.js"></script>
  <script src="../../components/layout/footer/footer.js"></script>

  <script src="../../components/layout/component_loader.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const loginForm = document.querySelector('.login-form');
      if (loginForm) {
        const errorWrapper = document.getElementById('login-error-wrapper');

        const resetErrorState = () => {
          if (errorWrapper) {
            errorWrapper.style.display = 'none';
          }

          loginForm.querySelectorAll('.input_group').forEach(group => {
            group.classList.remove('invalid');
          });
        };

        const showErrorState = () => {
          if (errorWrapper) {
            errorWrapper.style.display = 'block';
          }

          loginForm.querySelectorAll('.input_group').forEach(group => {
            group.classList.add('invalid');
          });
        };

        const navigateAfterLogin = async (sessionData) => {
          const [{ ROUTES }, { resolveRoute }, { isLocalFrontEnvironment }] = await Promise.all([
            import('../../core/constants/routes.js'),
            import('../../core/utils/path_resolver.js'),
            import('../../core/auth/local_admin.js')
          ]);

          const urlParams = new URLSearchParams(window.location.search);
          const redirectUrl = urlParams.get('redirect');

          if (redirectUrl && !redirectUrl.startsWith('javascript:') && !redirectUrl.startsWith('data:')) {
            window.location.replace(redirectUrl);
            return;
          }

          const routeKey = isLocalFrontEnvironment() && sessionData && sessionData.role && sessionData.role.includes('ADMIN')
            ? 'ADMIN.DASHBOARD'
            : 'HOME';

          try {
            const targetUrl = resolveRoute(routeKey);
            if (window.__JEJU_ROUTE_NAVIGATOR__?.safeNavigate) {
              window.__JEJU_ROUTE_NAVIGATOR__.safeNavigate(targetUrl, 'login-success');
              return;
            }
            window.location.replace(targetUrl);
          } catch (error) {
            window.location.replace(routeKey === 'ADMIN.DASHBOARD' ? ROUTES.ADMIN.DASHBOARD : ROUTES.HOME);
          }
        };

        // 입력 시작하면 에러 상태 초기화
        loginForm.querySelectorAll('input').forEach(input => {
          input.addEventListener('input', () => {
            resetErrorState();
          });
        });

        loginForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const rawId = document.getElementById('id').value.trim();
          const rawPw = document.getElementById('pw').value.trim();

          try {
            // [SECURITY] Import parameter validation and DOM sanitization
            const [{ validateParam, sanitizeHTML }, { saveSession }, { API_BASE_URL }] = await Promise.all([
              import('../../core/utils/sanitizer.js'),
              import('../../core/auth/session_manager.js'),
              import('../../core/config/api_config.js')
            ]);

            if (!validateParam(rawId) || !validateParam(rawPw)) {
              alert('잘못된 입력 형식이 포함되어 있습니다.');
              return;
            }

            const id = sanitizeHTML(rawId);
            const pw = sanitizeHTML(rawPw);

            const params = new URLSearchParams();
            params.append('id', id);
            params.append('pw', pw);

            const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
              },
              credentials: 'include',
              body: params
            });

            if (!response.ok) {
              let message = 'Authentication Failed';

              try {
                const errorPayload = await response.json();
                message = errorPayload.message || message;
              } catch (parseError) {
                // 에러 응답 파싱 실패는 무시
              }

              throw new Error(message);
            }

            const data = await response.json();
            const savedSession = saveSession(data.user);
            await navigateAfterLogin(savedSession);
          } catch (err) {
            console.error('Login Error:', err);
            showErrorState();
          }
        });
      }
    });
  </script>
</body>

</html>
